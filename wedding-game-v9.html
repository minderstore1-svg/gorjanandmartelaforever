const W=640, H=480;

// STATE
let gameState='title', currentLevel=0, score=0, lives=3, frameCount=0;
let keys={}, particles=[], screenFlash=0, screenFlashColor='#fff';
let cutsceneText=[], cutsceneIndex=0, cutsceneTimer=0;
let levelClearTimer=0, levelClearMsg='', levelData={};
let p1={}, p2={}, godMode=false, godModeBuffer='', paused=false, homeBuffer='', pauseOption=0;

// NARRATOR
const narratorBox=document.getElementById('narrator-box');
const narratorEl=document.getElementById('narrator-text');
function setNarrator(txt){
  if(!narratorBox||!narratorEl) return;
  // Hide during non-playing states
  const hide = gameState==='intro'||gameState==='cutscene'||gameState==='ending'||gameState==='title'||gameState==='credits';
  narratorBox.style.display = (txt&&!hide) ? 'block' : 'none';
  if(narratorEl) narratorEl.textContent = txt||'';
}

// INPUT
document.addEventListener('keydown',e=>{
  keys[e.key]=true; keys[e.code]=true;
 
  if(e.key==='Escape'){ if(gameState==='gameover') gameState='title'; else { togglePause(); pauseOption=0; } }
  if(gameState==='title'){
    var ml=['gorjan','martela','multi'];
    var si=ml.indexOf(playerMode); if(si<0) si=0;
    if(e.key==='ArrowUp'||e.key==='w'||e.key==='W') playerMode=ml[(si-1+3)%3];
    if(e.key==='ArrowDown'||e.key==='s'||e.key==='S') playerMode=ml[(si+1)%3];
    if(e.key==='1') playerMode='gorjan';
    if(e.key==='2') playerMode='martela';
    if(e.key==='3') playerMode='multi';
    if(e.key==='Enter'||e.key===' ') startGame();
  }
  if(gameState==='select'){
    if(e.key==='ArrowUp'||e.key==='w'||e.key==='W'){
      const modes=['gorjan','martela','multi'];
      const i=modes.indexOf(playerMode);
      playerMode=modes[(i-1+3)%3];
    }
    if(e.key==='ArrowDown'||e.key==='s'||e.key==='S'){
      const modes=['gorjan','martela','multi'];
      const i=modes.indexOf(playerMode);
      playerMode=modes[(i+1)%3];
    }
    if(e.key==='1') playerMode='gorjan';
    if(e.key==='2') playerMode='martela';
    if(e.key==='3') playerMode='multi';
    if(e.key==='Enter'||e.key===' ') startGame();
  }
  if(paused){
    if(e.key==='ArrowUp'||e.key==='w'||e.key==='W') pauseOption=0;
    if(e.key==='ArrowDown'||e.key==='s'||e.key==='S') pauseOption=1;
    if(e.key==='Enter'||e.key===' '){
      if(pauseOption===0){ paused=false; }
      else { paused=false; gameState='title'; dialogueQueue=[]; currentDialogue=null; setNarrator(''); clearHint(); }
    }
  }
  if(gameState==='intro'){
    const fullText = introLines[introIndex]?.text||'';
    const shown = Math.min(fullText.length, Math.floor(introTimer*2));
    const textDone = shown >= fullText.length;
    if(e.key==='Enter'||e.key===' '||e.key==='ArrowRight'){
      if(!textDone){ introTimer=9999; } // complete typewriter first
      else advanceIntro();
    }
    if((e.key==='ArrowLeft'||e.key==='Backspace') && introIndex>0){ introIndex--; introTimer=9999; }
  }
  if(gameState==='cutscene'){
    if(e.key==='Enter'||e.key===' ') advanceCutscene();
    if((e.key==='ArrowLeft'||e.key==='Backspace') && cutsceneIndex>0) cutsceneIndex--;
  }
  if(gameState==='levelclear'&&(e.key==='Enter'||e.key===' ')) nextLevel();
  if(gameState==='gameover'&&(e.key==='Enter'||e.key===' ')) retryLevel();
  if(gameState==='credits'&&(e.key==='Enter'||e.key===' ')) gameState='title';
  if(e.key.length===1){
    godModeBuffer=(godModeBuffer+e.key.toUpperCase()).slice(-3);
    if(godModeBuffer==='GOD'){
      godMode=!godMode;lives=godMode?99:3;
      screenFlash=40;screenFlashColor=godMode?'#ffd700':'#ff4444';
      const gb=document.getElementById('god-bar');
      if(gb) gb.style.display=godMode?'block':'none';
    }

  }
  if(godMode){
    if(e.key===']'){ if(gameState==='playing') triggerLevelClear('SKIPPED!'); }
    if(e.key==='['){ currentLevel=Math.max(1,currentLevel-1); lives=99; launchLevel(currentLevel); }
    if(e.key>='1'&&e.key<='9'){ currentLevel=parseInt(e.key); lives=99; launchLevel(currentLevel); }
    if(e.key==='0'){ currentLevel=9; lives=99; launchLevel(currentLevel); }
  }
  e.preventDefault();
});
document.addEventListener('keyup',e=>{ keys[e.key]=false; keys[e.code]=false; });
function togglePause(){ if(gameState==='playing') paused=!paused; }

// TEXT
function drawText(txt,x,y,size=8,color='#fff',shadow=true){
  ctx.textAlign='left';
  ctx.font=`${size}px 'Press Start 2P'`;
  if(shadow){ctx.fillStyle='#000';ctx.fillText(txt,x+1,y+1);}
  ctx.fillStyle=color; ctx.fillText(txt,x,y);
}
function drawTextC(txt,y,size=8,color='#fff',shadow=true){
  ctx.textAlign='left';
  ctx.font=`${size}px 'Press Start 2P'`;
  const w=ctx.measureText(txt).width;
  drawText(txt,(W-w)/2,y,size,color,shadow);
}

// Hint bar — shows below the game canvas, fades after ~5s
const hintBar = document.getElementById('hint-bar');
let hintFadeTimer = null;
function showHint(titleLine, controlLine){
  if(!hintBar) return;
  hintBar.innerHTML = '<span class="hl">'+titleLine+'</span><br>'+controlLine;
  hintBar.style.opacity='1';
  if(hintFadeTimer) clearTimeout(hintFadeTimer);
}
function clearHint(){
  if(!hintBar) return;
  if(hintFadeTimer) clearTimeout(hintFadeTimer);
  hintBar.style.opacity='0';
  hintBar.innerHTML='';
}
// Legacy no-op for canvas version (no longer draws anything)
function drawFadingHint(){}

// PARTICLES
function spawnParticle(x,y,color,count=6,speed=3){
  for(let i=0;i<count;i++){const a=(Math.PI*2*i)/count+Math.random()*.5;particles.push({x,y,vx:Math.cos(a)*speed*(0.5+Math.random()),vy:Math.sin(a)*speed*(0.5+Math.random()),color,life:1,size:3+Math.random()*4});}
}
function spawnHeart(x,y){ spawnParticle(x,y,'#ff4d6d',8,4); spawnParticle(x,y,'#ffd700',4,2); }
function updateParticles(){ particles=particles.filter(p=>p.life>0); particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=0.025;p.vx*=0.98;}); }
function drawParticles(){ particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.fillRect(Math.round(p.x),Math.round(p.y),Math.round(p.size),Math.round(p.size));});ctx.globalAlpha=1; }

// ================================================================
// SOUTH PARK STYLE CHARACTER DRAWERS
// Big oval head, tiny body, bold simple features, thick outlines
// Each character has ONE unmistakable visual signature
// ================================================================

function spOutline(x,y,w,h,r=3){ ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.strokeRect(x,y,w,h); }
function spOval(cx,cy,rx,ry,fill,stroke='#000',lw=2.5){
  ctx.fillStyle=fill; ctx.strokeStyle=stroke; ctx.lineWidth=lw;
  ctx.beginPath(); ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
}
function spRect(x,y,w,h,fill,stroke='#000',lw=2){
  ctx.fillStyle=fill; ctx.strokeStyle=stroke; ctx.lineWidth=lw;
  ctx.fillRect(x,y,w,h); ctx.strokeRect(x,y,w,h);
}
function spNameTag(name,x,y,color='#ffd700'){
  ctx.font="bold 10px 'Press Start 2P'";
  const tw=ctx.measureText(name).width;
  ctx.fillStyle='rgba(0,0,0,0.9)'; ctx.fillRect(x-tw/2-5,y-12,tw+10,14);
  ctx.strokeStyle=color; ctx.lineWidth=1.5; ctx.strokeRect(x-tw/2-5,y-12,tw+10,14);
  ctx.fillStyle=color; ctx.fillText(name,x-tw/2,y);
}

// == GORJAN: olive skin, thick dark beard covers half face, dark hair, big smile ==
function drawGorjan(x,y,facing,anim){
  if(facing===undefined) facing=1;
  if(anim===undefined) anim=0;
  const bx=Math.round(x), by=Math.round(y);
  const bob=Math.sin(anim*.18)*1.5;
  // body
  spRect(bx-8,by+4,16,18,'#556b7a');
  spRect(bx-3,by+6,6,10,'#c4622d');
  spRect(bx-5,by+22,4,8,'#2244aa'); spRect(bx+1,by+22,4,8,'#2244aa');
  spRect(bx-6,by+29,5,4,'#111'); spRect(bx+1,by+29,5,4,'#111');
  spRect(bx+(facing>0?8:-12),by+6,4,12,'#556b7a');
  spRect(bx+(facing>0?-12:8),by+8,4,10,'#556b7a');

  const hx=bx, hy=by-20+Math.round(bob);
  // face — warmer olive skin, rounder
  spOval(hx,hy,28,32,'#c09060');
  // short dark hair — close cut, fades at sides
  ctx.fillStyle='#1a1008'; ctx.strokeStyle='#000'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.ellipse(hx,hy-24,28,12,0,Math.PI,0); ctx.fill(); ctx.stroke();
  // faded sides (lighter at temple)
  spOval(hx-22,hy-14,8,10,'#2a1a10');
  spOval(hx+22,hy-14,8,10,'#2a1a10');
  // ears
  spOval(hx-28,hy,4,7,'#b8834a'); spOval(hx+28,hy,4,7,'#b8834a');
  // LIGHT STUBBLE ONLY — not a full beard, just scruff
  ctx.fillStyle='rgba(40,20,5,0.45)';
  ctx.beginPath(); ctx.ellipse(hx,hy+13,22,14,0,0,Math.PI); ctx.fill();
  // moustache shadow
  ctx.fillStyle='rgba(35,18,5,0.5)';
  ctx.beginPath(); ctx.ellipse(hx,hy-2,14,5,0,0,Math.PI*2); ctx.fill();
  // cheek stubble
  ctx.fillStyle='rgba(35,18,5,0.28)';
  ctx.beginPath(); ctx.ellipse(hx-16,hy+5,5,4,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(hx+16,hy+5,5,4,0,0,Math.PI*2); ctx.fill();
  // BIG warm brown eyes
  spOval(hx-11,hy-9,8,8,'#fff'); spOval(hx+11,hy-9,8,8,'#fff');
  ctx.fillStyle='#3d2008'; ctx.beginPath(); ctx.arc(hx-9,hy-8,5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#3d2008'; ctx.beginPath(); ctx.arc(hx+13,hy-8,5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.fillRect(hx-10,hy-10,2,2); ctx.fillRect(hx+12,hy-10,2,2);
  // brows
  ctx.strokeStyle='#1a1008'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(hx-18,hy-17); ctx.lineTo(hx-4,hy-15); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hx+4,hy-15); ctx.lineTo(hx+18,hy-17); ctx.stroke();
  // WIDE OPEN SMILE — his signature feature
  ctx.fillStyle='#e08878'; ctx.strokeStyle='#000'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(hx-14,hy+8); ctx.quadraticCurveTo(hx,hy+22,hx+14,hy+8); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.moveTo(hx-12,hy+8); ctx.quadraticCurveTo(hx,hy+18,hx+12,hy+8); ctx.fill();
  ctx.strokeStyle='#ddd'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(hx-5,hy+8); ctx.lineTo(hx-5,hy+15); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hx,hy+8); ctx.lineTo(hx,hy+17); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hx+5,hy+8); ctx.lineTo(hx+5,hy+15); ctx.stroke();
  // laugh lines
  ctx.strokeStyle='rgba(150,90,40,0.45)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(hx-16,hy+4); ctx.quadraticCurveTo(hx-18,hy+12,hx-16,hy+18); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hx+16,hy+4); ctx.quadraticCurveTo(hx+18,hy+12,hx+16,hy+18); ctx.stroke();

  spNameTag('GORJAN',hx,by-52,'#00ff88');
  drawText('P1',bx-8,by+36,6,'#00ff88');
}

// == MARTELA: fair skin, ICONIC PURPLE HAIR (big voluminous), big eyes, warm smile ==
function drawMartela(x,y,facing=1,anim=0,captured=false){
  const bx=Math.round(x), by=Math.round(y);
  const bob=captured?0:Math.sin(anim*.18+1)*1.5;
  // body - red kimono
  spRect(bx-8,by+4,16,18,'#e74c3c');
  spRect(bx-2,by+4,4,12,'#fff');
  spRect(bx-7,by+18,14,8,'#c0392b');
  spRect(bx-5,by+25,4,6,'#111'); spRect(bx+1,by+25,4,6,'#111');
  spRect(bx+(facing>0?8:-12),by+6,4,12,'#e74c3c');
  spRect(bx+(facing>0?-12:8),by+8,4,10,'#e74c3c');

  const hx=bx, hy=by-22+Math.round(bob);
  // face
  spOval(hx,hy,18,21,'#f0c8a8');
  // PURPLE HAIR - south park big poofy style, very distinctive
  ctx.fillStyle='#7b1fa2'; ctx.strokeStyle='#000'; ctx.lineWidth=2.5;
  // big top poof
  ctx.beginPath(); ctx.ellipse(hx,hy-18,22,16,0,0,Math.PI); ctx.fill(); ctx.stroke();
  // side volume
  ctx.beginPath(); ctx.ellipse(hx-16,hy-4,8,16,-.3,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(hx+16,hy-4,8,14,.3,0,Math.PI*2); ctx.fill(); ctx.stroke();
  // pink highlights - her signature look
  ctx.fillStyle='#e040fb'; ctx.strokeStyle='none';
  ctx.beginPath(); ctx.ellipse(hx-5,hy-22,5,8,-.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(hx+8,hy-20,4,6,.2,0,Math.PI*2); ctx.fill();
  // ears
  spOval(hx-19,hy,4,6,'#ddb898');
  spOval(hx+19,hy,4,6,'#ddb898');
  // BIG eyes with lashes (feminine SP style)
  spOval(hx-7,hy-5,6,6,'#fff');
  spOval(hx+7,hy-5,6,6,'#fff');
  ctx.fillStyle='#3d1a5a'; ctx.beginPath(); ctx.arc(hx-6,hy-5,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#3d1a5a'; ctx.beginPath(); ctx.arc(hx+8,hy-5,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.fillRect(hx-8,hy-7,2,2); ctx.fillRect(hx+7,hy-7,2,2);
  // lashes
  ctx.strokeStyle='#000'; ctx.lineWidth=1.5;
  [-3,-1,1].forEach(ox=>{ ctx.beginPath(); ctx.moveTo(hx-6+ox,hy-9); ctx.lineTo(hx-6+ox-1,hy-12); ctx.stroke(); });
  [-3,-1,1].forEach(ox=>{ ctx.beginPath(); ctx.moveTo(hx+8+ox,hy-9); ctx.lineTo(hx+8+ox-1,hy-12); ctx.stroke(); });
  // smile + pink lips
  ctx.fillStyle='#e0748a'; ctx.strokeStyle='#000'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.ellipse(hx,hy+10,8,5,0,0,Math.PI); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.ellipse(hx,hy+12,5,3,0,0,Math.PI); ctx.fill();
  // blush
  ctx.fillStyle='rgba(255,150,150,0.4)';
  ctx.beginPath(); ctx.ellipse(hx-13,hy+2,5,3,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(hx+13,hy+2,5,3,0,0,Math.PI*2); ctx.fill();

  if(captured){
    ctx.strokeStyle='#888'; ctx.lineWidth=2;
    ctx.strokeRect(hx-22,hy-35,44,65);
    for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo(hx-22+i*11,hy-35);ctx.lineTo(hx-22+i*11,hy+30);ctx.stroke();}
  }
  spNameTag('MARTELA',hx,by-50,'#ff69b4');
  if(!captured) drawText('P2',bx-8,by+36,6,'#ff69b4');
}

// == EMIR: light skin, slicked pale hair, HUGE WHITE ALBANIAN HAT, gun, menacing eyes ==
function drawEmir(x,y,anim){
  if(anim===undefined) anim=0;
  const bx=Math.round(x), by=Math.round(y);
  spRect(bx-8,by+4,16,18,'#1a1a2e');
  spRect(bx-4,by+6,8,10,'#555');
  spRect(bx-5,by+22,4,8,'#333'); spRect(bx+1,by+22,4,8,'#333');
  spRect(bx+8,by+4,5,12,'#1a1a2e');
  // GUN
  ctx.fillStyle='#333'; ctx.fillRect(bx+12,by+8,10,5);
  ctx.fillRect(bx+14,by+5,5,4);
  ctx.fillStyle='#666'; ctx.fillRect(bx+21,by+9,5,3);

  const hx=bx, hy=by-18;
  // face
  spOval(hx,hy,24,26,'#d4a574');
  // light hair visible at sides (below hat)
  ctx.fillStyle='#c8b89a'; ctx.strokeStyle='#000'; ctx.lineWidth=1;
  ctx.fillRect(hx-24,hy-20,48,6);

  // CORRECT PLIS HAT — brimless hemispherical skullcap
  // sits on top of head, no brim, soft rounded dome shape
  ctx.fillStyle='#f0ebe0'; ctx.strokeStyle='#000'; ctx.lineWidth=2.5;
  ctx.beginPath();
  ctx.moveTo(hx-26,hy-20);
  ctx.quadraticCurveTo(hx-28,hy-44,hx,hy-52);
  ctx.quadraticCurveTo(hx+28,hy-44,hx+26,hy-20);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // felt texture lines on hat
  ctx.strokeStyle='#e0dbd0'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(hx-22,hy-24); ctx.quadraticCurveTo(hx-18,hy-48,hx,hy-52); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hx+22,hy-24); ctx.quadraticCurveTo(hx+18,hy-48,hx,hy-52); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hx-12,hy-22); ctx.quadraticCurveTo(hx-8,hy-50,hx,hy-52); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hx+12,hy-22); ctx.quadraticCurveTo(hx+8,hy-50,hx,hy-52); ctx.stroke();
  // base edge of hat where it meets forehead
  ctx.strokeStyle='#d8d3c8'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(hx-26,hy-20); ctx.quadraticCurveTo(hx,hy-22,hx+26,hy-20); ctx.stroke();

  // ALBANIAN FLAG BADGE on front of hat
  // Red rectangle background (curved slightly to follow hat)
  ctx.fillStyle='#cc0000'; ctx.strokeStyle='#000'; ctx.lineWidth=1.2;
  ctx.beginPath();
  ctx.moveTo(hx-11,hy-44); ctx.quadraticCurveTo(hx,hy-47,hx+11,hy-44);
  ctx.lineTo(hx+10,hy-30); ctx.quadraticCurveTo(hx,hy-28,hx-10,hy-30);
  ctx.closePath(); ctx.fill(); ctx.stroke();

  // DOUBLE-HEADED EAGLE — clean simplified version
  const ex=hx, ey=hy-37; // eagle centre
  // Body
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(ex,ey,3.5,5,0,0,Math.PI*2); ctx.fill();
  // Left head + neck
  ctx.beginPath(); ctx.moveTo(ex-1,ey-4); ctx.quadraticCurveTo(ex-5,ey-8,ex-5,ey-12); ctx.stroke();
  ctx.beginPath(); ctx.arc(ex-5,ey-13,3,0,Math.PI*2); ctx.fill();
  // Left beak
  ctx.beginPath(); ctx.moveTo(ex-3,ey-12); ctx.lineTo(ex-1,ey-10); ctx.stroke();
  // Right head + neck
  ctx.beginPath(); ctx.moveTo(ex+1,ey-4); ctx.quadraticCurveTo(ex+5,ey-8,ex+5,ey-12); ctx.stroke();
  ctx.beginPath(); ctx.arc(ex+5,ey-13,3,0,Math.PI*2); ctx.fill();
  // Right beak
  ctx.beginPath(); ctx.moveTo(ex+3,ey-12); ctx.lineTo(ex+1,ey-10); ctx.stroke();
  // Wings spread left
  ctx.beginPath(); ctx.moveTo(ex-2,ey-2); ctx.quadraticCurveTo(ex-8,ey-2,ex-11,ey+2); ctx.quadraticCurveTo(ex-8,ey,ex-2,ey-1); ctx.fill();
  ctx.beginPath(); ctx.moveTo(ex-3,ey+1); ctx.quadraticCurveTo(ex-10,ey+2,ex-12,ey+6); ctx.quadraticCurveTo(ex-8,ey+4,ex-2,ey+2); ctx.fill();
  // Wings spread right
  ctx.beginPath(); ctx.moveTo(ex+2,ey-2); ctx.quadraticCurveTo(ex+8,ey-2,ex+11,ey+2); ctx.quadraticCurveTo(ex+8,ey,ex+2,ey-1); ctx.fill();
  ctx.beginPath(); ctx.moveTo(ex+3,ey+1); ctx.quadraticCurveTo(ex+10,ey+2,ex+12,ey+6); ctx.quadraticCurveTo(ex+8,ey+4,ex+2,ey+2); ctx.fill();
  // Talons
  ctx.strokeStyle='#000'; ctx.lineWidth=1;
  [-2,0,2].forEach(ox=>{ ctx.beginPath(); ctx.moveTo(ex-2+ox,ey+4); ctx.lineTo(ex-3+ox,ey+7); ctx.stroke(); });
  [-2,0,2].forEach(ox=>{ ctx.beginPath(); ctx.moveTo(ex+2+ox,ey+4); ctx.lineTo(ex+1+ox,ey+7); ctx.stroke(); });

  // ears
  spOval(hx-24,hy,4,6,'#c09060'); spOval(hx+24,hy,4,6,'#c09060');
  // stubble shadow
  ctx.fillStyle='rgba(100,60,20,0.4)';
  ctx.beginPath(); ctx.ellipse(hx,hy+10,18,13,0,0,Math.PI); ctx.fill();
  // MENACING narrow eyes
  ctx.fillStyle='#fff'; ctx.strokeStyle='#000'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(hx-14,hy-5); ctx.quadraticCurveTo(hx-8,hy-8,hx-2,hy-5); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hx+2,hy-5); ctx.quadraticCurveTo(hx+8,hy-8,hx+14,hy-5); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#1a0808';
  ctx.beginPath(); ctx.arc(hx-8,hy-5,2.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(hx+8,hy-5,2.5,0,Math.PI*2); ctx.fill();
  // heavy angry brows

let dialogueQueue=[],currentDialogue=null;

function queueDialogue(speaker,text,duration,color){
  dialogueQueue.push({speaker,text,duration:duration||200,color:color||'#ffd700',timer:0});
}
function updateDialogue(){
  if(currentDialogue){currentDialogue.timer++;if(currentDialogue.timer>currentDialogue.duration)currentDialogue=null;}
  if(!currentDialogue&&dialogueQueue.length>0)currentDialogue=dialogueQueue.shift();
}
function drawDialogue(){
  if(!currentDialogue)return;
  const d=currentDialogue, progress=Math.min(1,d.timer/20), y=H-90+(1-progress)*30;
  ctx.fillStyle='rgba(0,0,0,0.9)';ctx.fillRect(10,y,W-20,74);
  ctx.strokeStyle=d.color;ctx.lineWidth=2;ctx.strokeRect(10,y,W-20,74);
  ctx.fillStyle=d.color;ctx.font="bold 8px 'Press Start 2P'";ctx.fillText('> '+d.speaker+':',18,y+17);
  ctx.font="7px 'Press Start 2P'";ctx.fillStyle='#fff';
  const words=d.text.split(' ');let line='',lineY=y+34,maxW=W-44;
  words.forEach(w=>{const t=line+(line?' ':'')+w;if(ctx.measureText(t).width>maxW){ctx.fillText(line,18,lineY);lineY+=16;line=w;}else line=t;});
  if(line)ctx.fillText(line,18,lineY);
}
function startNewsTicker(text){newsTicker=text;newsTickerX=W;newsTickerActive=true;}
function drawNewsTicker(){

function roundRect(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}
function drawPhone(airPct){

  // Screen glass
  ctx.fillStyle='#001408'; ctx.fillRect(px+5,py+15,PW-10,PH-26);
  // Notch / speaker
  ctx.fillStyle='#222'; ctx.fillRect(px+PW/2-14,py+5,28,5);
  ctx.fillStyle='#333'; ctx.beginPath(); ctx.arc(px+PW/2+12,py+7,2,0,Math.PI*2); ctx.fill();

  ctx.font="5px 'Press Start 2P'"; ctx.fillStyle='#555';
  ctx.fillText('LIVE', px+PW-26, py+27);

  // Big % readout
  const bigCol = col;
  ctx.font="bold 22px 'Press Start 2P'"; ctx.fillStyle=bigCol;

  const pw2 = ctx.measureText(pctStr).width;
  ctx.fillText(pctStr, px+PW/2-pw2/2, py+62);
  // Status label
  const statusLabel = airPct>0.6?'CLEAN':airPct>0.3?'MODERATE':'DANGER';
  ctx.font="5px 'Press Start 2P'"; ctx.fillStyle=col;
  const slw = ctx.measureText(statusLabel).width;
  ctx.fillText(statusLabel, px+PW/2-slw/2, py+74);

  // Bar chart area
  const barAreaX=px+8, barAreaY=py+80, barAreaW=PW-16, barAreaH=44;
  ctx.fillStyle='#002208'; ctx.fillRect(barAreaX,barAreaY,barAreaW,barAreaH);
  const numBars=8;
  const barW=Math.floor((barAreaW-4)/numBars)-1;
  for(let i=0;i<numBars;i++){
    const wave=Math.sin(frameCount*0.04+i*0.8)*0.12;
    const bh=Math.round((0.15+wave+airPct*0.7)*barAreaH);
    const bx=barAreaX+2+i*(barW+1);
    const by=barAreaY+barAreaH-bh;
    // bar glow
    ctx.fillStyle='rgba(0,80,20,0.5)'; ctx.fillRect(bx,barAreaY,barW,barAreaH);
    ctx.fillStyle=col; ctx.fillRect(bx,by,barW,bh);
    // highlight top
    ctx.fillStyle='rgba(255,255,255,0.25)'; ctx.fillRect(bx,by,barW,2);
  }
  ctx.strokeStyle='#004418'; ctx.lineWidth=1; ctx.strokeRect(barAreaX,barAreaY,barAreaW,barAreaH);
  // Chart label
  ctx.font="4px 'Press Start 2P'"; ctx.fillStyle='#446644';
  ctx.fillText('AIR QUALITY INDEX', barAreaX+2, barAreaY+barAreaH+8);

  // Bottom home bar
  ctx.fillStyle='#333'; ctx.fillRect(px+PW/2-14,py+PH-8,28,3);
}


// ======== PRE-LEVEL INTRO SYSTEM ========
let introLines = [], introIndex = 0, introTimer = 0, introLevelName = '';

function startIntro(levelName, lines) {
  introLevelName = levelName;
  introLines = lines;
  introIndex = 0;
  introTimer = 0;
  gameState = 'intro';
}

function advanceIntro() {
  introIndex++;
  introTimer = 0;
  if (introIndex >= introLines.length) {
    gameState = 'playing';
    introLines = [];
    // Restore narrator for gameplay
    if(narratorBox) narratorBox.style.display='none';
  }
}

function drawIntro() {
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);
  for(let y=0;y<H;y+=4){ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(0,y,W,1);}

  ctx.fillStyle='#111';ctx.fillRect(0,0,W,36);
  ctx.strokeStyle='#ffd700';ctx.lineWidth=1;ctx.strokeRect(0,0,W,36);
  drawTextC(introLevelName,24,8,'#ffd700');

  if(!introLines.length||!introLines[introIndex]) return;
  const line = introLines[introIndex];
  introTimer++;
  const isLeft = introIndex % 2 === 0;
  const slideIn = Math.min(1, introTimer/12);

  // Character portrait
  ctx.save();
  ctx.scale(1.8,1.8);
  const px = isLeft ? 50 : (W/1.8)-50;
  const py = (H/1.8)/2 - 30;
  if(line.drawFn) line.drawFn(px, py, isLeft?1:-1, frameCount);
  ctx.restore();

  // Speech bubble
  const bx = isLeft ? 170 : 30;
  const bw = W - 200;
  const by = H/2 + 20;
  const bh = 120;
  const animX = bx + (1-slideIn)*(isLeft?-50:50);

  ctx.fillStyle='rgba(0,0,0,0.93)';
  ctx.strokeStyle=line.color||'#ffd700';
  ctx.lineWidth=2.5;
  roundRect(animX,by,bw,bh,6);
  ctx.fill();ctx.stroke();

  // Pointer triangle
  ctx.fillStyle='rgba(0,0,0,0.93)';
  const portraitX = isLeft ? 90 : W-90;
  ctx.beginPath();
  if(isLeft){ctx.moveTo(animX+20,by);ctx.lineTo(animX+50,by);ctx.lineTo(portraitX,by-22);}
  else{ctx.moveTo(animX+bw-20,by);ctx.lineTo(animX+bw-50,by);ctx.lineTo(portraitX,by-22);}
  ctx.closePath();ctx.fill();
  ctx.strokeStyle=line.color||'#ffd700';ctx.lineWidth=2;ctx.stroke();

  // Speaker name
  ctx.fillStyle=line.color||'#ffd700';
  ctx.font="bold 9px 'Press Start 2P'";
  ctx.fillText(line.speaker, animX+14, by+20);

  // Typewriter text
  const fullText = line.text;
  const shown = Math.min(fullText.length, Math.floor(introTimer*2));
  ctx.font="7px 'Press Start 2P'"; ctx.fillStyle='#fff';
  const words = fullText.substring(0,shown).split(' ');
  let ls='', ly=by+38, mw=bw-28;
  words.forEach(w=>{
    const t=ls+(ls?' ':'')+w;
    if(ctx.measureText(t).width>mw){ctx.fillText(ls,animX+14,ly);ly+=18;ls=w;}
    else ls=t;
  });
  if(ls) ctx.fillText(ls,animX+14,ly);

  // Progress dots
  for(let i=0;i<introLines.length;i++){
    ctx.fillStyle=i===introIndex?'#ffd700':'#333';
    ctx.beginPath();ctx.arc(W/2-(introLines.length-1)*9+i*18,by+bh-14,5,0,Math.PI*2);ctx.fill();
  }

  // Continue prompt (only when text fully shown, no auto-timer)
  if(shown>=fullText.length){
    if(Math.floor(frameCount/25)%2===0){
      const isLast = introIndex >= introLines.length-1;
      const isFirst = introIndex === 0;
      const nextMsg = isLast ? 'ENTER — LET\'S GO!' : 'ENTER — NEXT ►';
      const backMsg = isFirst ? '' : '◄ BACK';
      const fullMsg = (!isFirst ? backMsg+'   ' : '') + nextMsg;
      drawTextC(fullMsg, by+bh+18, 7, '#aaa');
    }
  }
}

    ctx.fillRect(s.x,s.y,s.s,s.s);
  });

  drawTextC('GORJAN & MARTELA', 40, 13, '#ffd700');
  drawTextC('F O R E V E R',   64, 8,  '#ff4d6d');
  ctx.fillStyle='#333'; ctx.fillRect(60,80,W-120,1);

  var modeList = ['gorjan','martela','multi'];
  var sel = modeList.indexOf(playerMode);
  if(sel<0) sel=0;

  var labels   = ['GORJAN',              'MARTELA',             'CO-OP'];
  var subs     = ['SINGLE PLAYER  (P1)', 'SINGLE PLAYER  (P2)', '2 PLAYERS TOGETHER'];
  var ctrlTxt  = ['WASD + SPACE',        'ARROWS + ENTER',      'BOTH CONTROLLERS'];
  var colors   = ['#00ff88',             '#ff69b4',             '#ffd700'];
  var nums     = ['1','2','3'];

  for(var i=0;i<3;i++){
    var isS = (i===sel);
    var bY  = 94 + i*116;
    var col = colors[i];

    // box
    if(isS){ ctx.fillStyle='rgba(80,80,80,0.18)'; }
    else   { ctx.fillStyle='rgba(255,255,255,0.03)'; }
    ctx.fillRect(56, bY, W-112, 106);

    ctx.strokeStyle = isS ? col : '#2a2a2a';
    ctx.lineWidth   = isS ? 3   : 1;
    ctx.strokeRect(56, bY, W-112, 106);

    // pulsing arrow cursor
    if(isS){
      var pulse = Math.round(Math.sin(frameCount*0.14)*5);
      ctx.fillStyle = col;
      ctx.font = "16px 'Press Start 2P'";
      ctx.fillText('>', 66+pulse, bY+62);
    }

    // character portrait
    ctx.save();
    if(i===0){ drawGorjan(152, bY+52, 1, frameCount); }
    if(i===1){ drawMartela(152, bY+52, -1, frameCount); }
    if(i===2){
      ctx.scale(0.7,0.7);
      drawGorjan(170/0.7, (bY+52)/0.7, 1, frameCount);
      drawMartela(230/0.7, (bY+52)/0.7, -1, frameCount);
    }
    ctx.restore();

    // labels
    var tx = 210;
    drawText(labels[i],  tx, bY+26, isS?12:9,  isS?col:'#444');
    drawText(subs[i],    tx, bY+50, 7,          isS?'#fff':'#333');
    drawText(ctrlTxt[i], tx, bY+68, 6,          isS?'#aaa':'#222');

    // number badge top-right
    ctx.fillStyle = isS ? col : '#222';
    ctx.fillRect(W-88, bY+10, 26, 22);
    drawText(nums[i], W-82, bY+26, 8, isS?'#000':'#555', false);
  }

  // Bottom bar
  ctx.fillStyle='#0a0a0a'; ctx.fillRect(0,H-52,W,52);
  ctx.fillStyle=colors[sel]; ctx.fillRect(0,H-53,W,2);

  var blink = Math.floor(frameCount/22)%2===0;
  drawTextC('UP / DOWN  to choose', H-34, 7, blink?'#fff':'#888');
  drawTextC('ENTER or SPACE  to confirm', H-14, 7, blink?colors[sel]:'#555');
}

// DRAGAN as Squid Game Boss - black hooded coat, mask
function drawDraganBoss(x,y,anim=0){
  const bx=Math.round(x), by=Math.round(y);
  const hx=bx, hy=by-20;
  // Long black coat
  ctx.fillStyle='#0a0a0a'; ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=2;
  ctx.fillRect(bx-14,by+2,28,30); ctx.strokeRect(bx-14,by+2,28,30);
  // Coat flare at bottom
  ctx.beginPath();
  ctx.moveTo(bx-14,by+32); ctx.lineTo(bx-20,by+48);
  ctx.lineTo(bx+20,by+48); ctx.lineTo(bx+14,by+32);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // Arms - long sleeves
  ctx.fillRect(bx+14,by+4,6,20); ctx.fillRect(bx-20,by+4,6,20);
  // Gloves
  ctx.fillStyle='#111'; ctx.fillRect(bx+14,by+22,7,8); ctx.fillRect(bx-21,by+22,7,8);
  // Hood
  ctx.fillStyle='#0a0a0a';
  ctx.beginPath(); ctx.ellipse(hx,hy-8,22,20,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
  // Hood shadow/depth
  ctx.fillStyle='#050505';
  ctx.beginPath(); ctx.ellipse(hx,hy-6,16,14,0,0,Math.PI*2); ctx.fill();
  // MASK - geometric, dark with slits
  ctx.fillStyle='#1a1a2a'; ctx.strokeStyle='#333'; ctx.lineWidth=1.5;
  ctx.fillRect(hx-10,hy-14,20,18); ctx.strokeRect(hx-10,hy-14,20,18);
  // Eye slits
  ctx.fillStyle='#0a0a3a';
  ctx.fillRect(hx-8,hy-10,6,3); ctx.fillRect(hx+2,hy-10,6,3);
  // Nose indent
  ctx.fillStyle='#111'; ctx.fillRect(hx-2,hy-6,4,4);
  // Mouth slit
  ctx.fillStyle='#0a0a0a'; ctx.fillRect(hx-6,hy-1,12,2);
  // Geometric lines on mask
  ctx.strokeStyle='#2a2a4a'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(hx-10,hy-5); ctx.lineTo(hx+10,hy-5); ctx.stroke();
  // CTO badge on coat - centred on chest, clear of arms
  ctx.fillStyle='#ffd700'; ctx.strokeStyle='#aa8800'; ctx.lineWidth=1.5;
  ctx.fillRect(bx-9,by+14,18,12); ctx.strokeRect(bx-9,by+14,18,12);
  drawText('CTO',bx-7,by+24,5,'#000',false);
  // Health label
  spNameTag('DRAGAN',hx,by-48,'#ff4444');
}

function initLevel1(){
    levelData={
    p1:{x:160,y:H-70,bullets:[],shootCool:0},
    p2:{x:480,y:H-70,bullets:[],shootCool:0},
    clouds:[],spawnTimer:0,

  };

  levelData.tickerX=W;

function spawnCloud(){
  const bad=Math.random()>0.25;
  // avoid the phone zone: top-right corner (x > W-120 when y < 185)
  let cx, tries=0;
  do { cx=20+Math.random()*(W-40); tries++; }
  while(cx > W-120 && tries < 20);
  levelData.clouds.push({
    x:cx,y:-30-Math.random()*80,
    size:20+Math.random()*18,
    vy:0.6+Math.random()*0.8+(levelData.killed/60)*0.3,
    vx:(Math.random()-0.5)*0.5,
    type:bad?'bad':'good',alive:true,
    wobble:Math.random()*Math.PI*2,
  });
}

function runLevel1(){
  const d=levelData;
  // starfield bg
  ctx.fillStyle='#050515'; ctx.fillRect(0,0,W,H);
  d.stars.forEach(s=>{ ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.fillRect(s.x,s.y,s.s,s.s); });
  // city silhouette
  [0,80,160,240,320,400,480,560].forEach((bx,i)=>{
    const bh=60+(i*43)%100;
    ctx.fillStyle='#0a0a1a'; ctx.fillRect(bx,H-80-bh,70,bh+80);
    ctx.fillStyle='#1a1a2a'; ctx.fillRect(bx+5,H-70-bh,60,bh);
    for(let wx=8;wx<55;wx+=14) for(let wy=10;wy<bh-10;wy+=18)
      if(Math.random()>0.4){ctx.fillStyle='rgba(255,220,100,0.4)';ctx.fillRect(bx+wx,H-70-bh+wy,6,8);}
  });
  ctx.fillStyle='#1a1a2a'; ctx.fillRect(0,H-80,W,80);

  // spawn
  d.spawnTimer++;
  if(d.spawnTimer>70&&d.clouds.filter(c=>c.alive).length<10){spawnCloud();d.spawnTimer=0;}

  // clouds
  d.clouds.forEach(c=>{
    if(!c.alive)return;
    c.wobble+=0.04; c.x+=c.vx; c.y+=c.vy;
    if(c.x<0||c.x>W)c.vx*=-1;
    const col=c.type==='bad'?'#8B7355':'#88aaff';
    ctx.globalAlpha=0.8+Math.sin(c.wobble)*0.2;
    ctx.fillStyle=col;
    ctx.beginPath();ctx.arc(c.x,c.y,c.size,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(c.x+c.size*.7,c.y-5,c.size*.65,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(c.x-c.size*.7,c.y-3,c.size*.55,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    const lbl=c.type==='bad'?'BAD':'GOOD';
    const lcol=c.type==='bad'?'#ff6644':'#44ff88';
    drawText(lbl,c.x-10,c.y+4,5,lcol,true);
    if(c.y>H-75){c.alive=false;if(c.type==='bad'){lives=Math.max(0,lives-1);screenFlash=15;screenFlashColor='#ff0000';if(lives<=0)gameState='gameover';}}
  });

  // shooter ships (P1 left, P2 right)
  function drawShip(sx,sy,col,lbl){
    ctx.fillStyle=col;
    ctx.beginPath();ctx.moveTo(sx,sy-16);ctx.lineTo(sx-16,sy+10);ctx.lineTo(sx+16,sy+10);ctx.closePath();ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.moveTo(sx,sy-10);ctx.lineTo(sx-8,sy+6);ctx.lineTo(sx+8,sy+6);ctx.closePath();ctx.fill();
    ctx.fillStyle='#88aaff';ctx.fillRect(sx-3,sy-4,6,8);
    drawText(lbl,sx-8,sy+18,6,col);
  }

  // P1 ship movement + shooting
  var l1max=p2Active()?W/2-20:W-20;
  if(keys['a']||keys['A']) d.p1.x=Math.max(20,d.p1.x-3.5);
  if(keys['d']||keys['D']) d.p1.x=Math.min(l1max,d.p1.x+3.5);
  d.p1.shootCool--;
  if((keys[' ']||keys['f']||keys['F'])&&d.p1.shootCool<=0){
    d.p1.bullets.push({x:d.p1.x,y:d.p1.y-16,alive:true});
    d.p1.shootCool=12;
  }
  drawShip(d.p1.x,d.p1.y,'#00ff88',p2Active()?'P1':'YOU');

  // P2 ship movement + shooting
  if(p2Active()){
    if(keys['ArrowLeft']) d.p2.x=Math.max(W/2+20,d.p2.x-3.5);
    if(keys['ArrowRight']) d.p2.x=Math.min(W-20,d.p2.x+3.5);
  }
  d.p2.shootCool--;
  if((keys['Enter']||keys['ArrowUp'])&&d.p2.shootCool<=0){
    d.p2.bullets.push({x:d.p2.x,y:d.p2.y-16,alive:true});
    d.p2.shootCool=12;
  }
  if(p2Active()) drawShip(d.p2.x,d.p2.y,'#ff69b4','P2');

  // draw + update bullets
  [d.p1.bullets,d.p2.bullets].forEach(blist=>{
    blist.forEach(b=>{
      if(!b.alive)return;
      b.y-=9;
      ctx.fillStyle='#ffff00'; ctx.fillRect(b.x-2,b.y,4,12);
      ctx.fillStyle='#ff8800'; ctx.fillRect(b.x-1,b.y+10,2,5);
      if(b.y<-20){b.alive=false;return;}
      // hit clouds
      d.clouds.forEach(c=>{
        if(!c.alive)return;
        if(Math.abs(b.x-c.x)<c.size+5&&Math.abs(b.y-c.y)<c.size+5){
          b.alive=false; c.alive=false;
          if(c.type==='bad'){d.killed++;score+=100;spawnHeart(c.x,c.y);}
          else{lives=Math.max(0,lives-1);screenFlash=10;screenFlashColor='#ff8800';spawnParticle(c.x,c.y,'#ff4400',8,4);}
        }
      });
    });
    blist.splice(0,blist.length,...blist.filter(b=>b.alive));
  });

  // progress
  // Single news ticker (global system)
  if(d.killed>=d.goal&&!d.winTickerFired){
    d.winTickerFired=true;
    startNewsTicker('LOCAL COUPLE SAVES CITY AIR QUALITY. APP GOES VIRAL.  |  AIRWATCH #1 APP  |  MARTELA RATED IT 4/5 STARS');
  }


  // air quality progress bar (HUD strip, left side only — right is phone)
  const pct=Math.min(1,d.killed/d.goal);
  ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(10,8,W-140,13);
  ctx.fillStyle=pct>0.6?'#00ff88':pct>0.3?'#ffaa00':'#ff4444';
  ctx.fillRect(10,8,(W-140)*pct,13);
  ctx.strokeStyle='#555'; ctx.lineWidth=1; ctx.strokeRect(10,8,W-140,13);
  drawText('SHOT '+d.killed+'/'+d.goal, 14, 18, 5, '#fff', false);

  drawPhone(pct);
  drawNewsTicker();

  updateDialogue(); drawDialogue();
  if(d.killed>=d.goal) triggerLevelClear('AIR IS CLEAN!\nAPP GOES VIRAL!\n+' +score+ ' PTS');
}

  for(let gx=0;gx<W;gx+=40){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,H);ctx.stroke();}
  for(let gy=0;gy<H;gy+=40){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke();}
  ctx.fillStyle='#2a0020';ctx.fillRect(0,420,W,60);

  drawText('SQUID GAMES: GORJAN\'S BIRTHDAY SPECIAL',10,20,6,'#ff1493');

  updateDialogue(); drawDialogue();
  if(d.minigame==='redlight'){
    d.lightTimer++;
    if(d.lightTimer>d.lightDuration){
      d.greenLight=!d.greenLight;
      d.lightTimer=0;
      d.lightDuration=50+Math.random()*80;
      if(!d.greenLight){
        // penalise only if actively pressing a movement key at the moment of red

        if(p1Active()&&p1pressing){lives=Math.max(0,lives-1);screenFlash=20;screenFlashColor='#ff0000';d.p1x=Math.max(60,d.p1x-30);}
        if(p2Active()&&p2pressing){lives=Math.max(0,lives-1);screenFlash=20;screenFlashColor='#ff0000';d.p2x=Math.max(120,d.p2x-30);}
      } else {
        d.p1safeX=d.p1x; d.p2safeX=d.p2x;
      }
    }
    // movement only on GREEN light
    if(d.greenLight){
      if(p1Active()){
        if(keys['d']||keys['D']) d.p1x=Math.min(W-40,d.p1x+3);
        if(keys['a']||keys['A']) d.p1x=Math.max(20,d.p1x-1);
      }
      if(p2Active()){
        if(keys['ArrowRight']) d.p2x=Math.min(W-20,d.p2x+3);
        if(keys['ArrowLeft']) d.p2x=Math.max(20,d.p2x-1);
      }
    }
    // Dragan as the hooded game master
    drawDraganBoss(W/2, 200, frameCount);
    // screen tint — GREEN when go, RED when freeze (FIXED)
    ctx.fillStyle=d.greenLight?'rgba(0,255,0,0.08)':'rgba(255,0,0,0.14)';
    ctx.fillRect(0,0,W,H);
    // big GO / FREEZE text (FIXED)
    drawText(d.greenLight?'GO!  GO!  GO!':'FREEZE!!!',W/2-70,370,11,d.greenLight?'#00ff00':'#ff0000');
    // traffic light
    ctx.fillStyle='#333';ctx.fillRect(12,50,32,80);
    ctx.fillStyle=d.greenLight?'#220000':'#ff0000'; ctx.beginPath();ctx.arc(28,70,12,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=d.greenLight?'#00ff00':'#002200'; ctx.beginPath();ctx.arc(28,100,12,0,Math.PI*2);ctx.fill();
    // finish flag
    ctx.fillStyle='#ffd700';ctx.fillRect(W-30,300,8,80);
    for(let fy=300;fy<380;fy+=16){ctx.fillStyle=fy%32===0?'#ffd700':'#000';ctx.fillRect(W-22,fy,16,16);}
    drawText('FINISH',W-60,295,5,'#ffd700');
    // players
    if(p1Active()) drawGorjan(d.p1x,400,1,frameCount);
    if(p2Active()) drawMartela(d.p2x,400,1,frameCount);


    var l2done=(!p1Active()||d.p1x>W-50)&&(!p2Active()||d.p2x>W-50);
    if(l2done){
      startNewsTicker('LOCAL COUPLE DEFEATS SQUID GAME DOLL. DRAGAN ELIMINATED IN ROUND 1.');
      d.minigame='bridge';
      d.step1=undefined; d.step2=undefined;
      d.bridgeStartFrame=frameCount;
      showHint('GLASS BRIDGE — GUESS WHICH PANEL IS SAFE!','P1: W=top  S=bottom  D=finish   |   P2: UP=top  DOWN=bottom  RIGHT=finish');
    }
    if(lives<=0) gameState='gameover';

  } else {
    // GLASS BRIDGE — rebalanced layout
    const panW=50, panH=20, startX=42, gap=63;
    const topY=240, botY=290;
    // start and end pads
    const spdX=2,  spdW=34;   // start pad: x=2..36
    const epdX=600, epdW=38;  // end pad: x=600..638

    // water / danger zone
    ctx.fillStyle='rgba(0,0,120,0.4)';ctx.fillRect(startX,310,epdX-startX,H-310);
    drawText('DANGER',W/2-30,H-10,6,'#ff4444');

    // start pad
    ctx.fillStyle='#3a5a3a'; ctx.fillRect(spdX,topY-10,spdW,botY+panH-(topY-10)+10);
    ctx.strokeStyle='#00ff88'; ctx.lineWidth=1.5; ctx.strokeRect(spdX,topY-10,spdW,botY+panH-(topY-10)+10);
    drawText('GO',spdX+4,botY+panH+8,5,'#00ff88');

    // end pad
    ctx.fillStyle='#5a3a5a'; ctx.fillRect(epdX,topY-10,epdW,botY+panH-(topY-10)+10);
    ctx.strokeStyle='#ffd700'; ctx.lineWidth=1.5; ctx.strokeRect(epdX,topY-10,epdW,botY+panH-(topY-10)+10);
    drawText('END',epdX+4,botY+panH+8,5,'#ffd700');

    // bridge panels
    for(let i=0;i<9;i++){
      const bp=d.bridge[i]; const bpx=startX+i*gap;
      const topCol=bp.revealed?(bp.safe?'#00cc66':'#cc2200'):'#88bbff';
      const botCol=bp.revealed?(!bp.safe?'#00cc66':'#cc2200'):'#88bbff';
      ctx.globalAlpha=0.8;
      ctx.fillStyle=topCol; ctx.fillRect(bpx,topY,panW,panH);
      ctx.fillStyle=botCol; ctx.fillRect(bpx,botY,panW,panH);
      ctx.globalAlpha=1;
      ctx.strokeStyle='#4488ff'; ctx.lineWidth=1.5;
      ctx.strokeRect(bpx,topY,panW,panH); ctx.strokeRect(bpx,botY,panW,panH);
      // label TOP/BOT on unrevealed panels
      if(!bp.revealed){
        drawText('T',bpx+panW/2-4,topY+14,5,'rgba(255,255,255,0.5)',false);
        drawText('B',bpx+panW/2-4,botY+14,5,'rgba(255,255,255,0.5)',false);
      }
    }

    // P1 — W=top, S=bottom, D=finish (only on panel 8)
    if(d.step1===undefined) d.step1=-1;
    if(!d.p1cool) d.p1cool=0;
    if(!d.p1row) d.p1row='top';
    d.p1cool=Math.max(0,d.p1cool-1);
    const p1rowKey=(keys['w']||keys['W']||keys['s']||keys['S']);
    const p1finishKey=(keys['d']||keys['D'])&&d.step1===8;
    const p1wantStep=(p1rowKey||p1finishKey)&&d.p1cool===0;
    if(p1wantStep){
      if(keys['s']||keys['S']) d.p1row='bottom';
      else if(keys['w']||keys['W']) d.p1row='top';
      d.p1cool=22;
      const target=d.step1+1;
      if(target<=8){
        const bp=d.bridge[target];
        bp.revealed=true;
        const safe=d.p1row==='top'?bp.safe:!bp.safe;
        if(safe){d.step1=target;score+=50;}
        else{lives=Math.max(0,lives-1);screenFlash=18;screenFlashColor='#ff0000';/* stay on d.step1 */}
      } else {d.step1=9;}
    }
    const p1bx=d.step1<0?spdX+spdW/2:(d.step1<9?startX+d.step1*gap+panW/2:epdX+epdW/2);
    const p1y=d.step1<0?topY-22:(d.p1row==='top'?topY-22:botY-22);
    if(p1Active()) drawGorjan(p1bx,p1y,1,frameCount);

    // P2 — UP=top, DOWN=bottom, RIGHT=finish (only on panel 8)
    if(d.step2===undefined) d.step2=-1;
    if(!d.p2cool) d.p2cool=0;
    if(!d.p2row) d.p2row='top';
    d.p2cool=Math.max(0,d.p2cool-1);
    const p2rowKey=(keys['ArrowUp']||keys['ArrowDown']);
    const p2finishKey=keys['ArrowRight']&&d.step2===8;
    const p2wantStep=(p2rowKey||p2finishKey)&&d.p2cool===0;
    if(p2wantStep){
      if(keys['ArrowDown']) d.p2row='bottom';
      else if(keys['ArrowUp']) d.p2row='top';
      d.p2cool=22;
      const target2=d.step2+1;
      if(target2<=8){
        const bp2=d.bridge[target2];
        bp2.revealed=true;
        const safe2=d.p2row==='top'?bp2.safe:!bp2.safe;
        if(safe2){d.step2=target2;score+=50;}
        else{lives=Math.max(0,lives-1);screenFlash=18;screenFlashColor='#ff0000';/* stay on d.step2 */}
      } else {d.step2=9;}
    }
    const p2bx=d.step2<0?spdX+spdW/2+20:(d.step2<9?startX+d.step2*gap+panW/2:epdX+epdW/2);
    const p2y=d.step2<0?botY-22:(d.p2row==='top'?topY-22:botY-22);
    if(p2Active()) drawMartela(p2bx,p2y,1,frameCount);

    if((!p1Active()||d.step1>=9)&&(!p2Active()||d.step2>=9)){
      drawGorjan(W-20,270,1,frameCount);
      drawMartela(W-40,270,-1,frameCount);
      triggerLevelClear('BRIDGE CROSSED!\nYOU SURVIVED!\nNOBODY FELL!');
    }
    if(lives<=0) gameState='gameover';
    if(lives<=0) gameState='gameover';
  }
}

// == LEVEL 3: JAPAN -- RAMEN SNAKE ==================================
// ==================================================================
const CELL=20, COLS=32, ROWS=24;
function initLevel3(){
    const startX=5,startY=9;
  levelData={
    snake1:[{x:startX,y:startY},{x:startX-1,y:startY},{x:startX-2,y:startY}],
    dir1:{x:1,y:0}, nextDir1:{x:1,y:0},
    snake2:[{x:COLS-5,y:ROWS-9},{x:COLS-4,y:ROWS-9},{x:COLS-3,y:ROWS-9}],
    dir2:{x:-1,y:0}, nextDir2:{x:-1,y:0},
    ramen:[],specialRamen:[],
    eaten1:0,eaten2:0,goal:18,
    moveTimer:0,moveInterval:9,
    dead1:false,dead2:false,
    cherries:Array.from({length:15},()=>({x:Math.random()*W,y:-Math.random()*200,vy:0.4+Math.random()*0.3})),
  };
  setNarrator('');
  levelData.startFrame=frameCount;
  showHint('EAT THE RAMEN — DON\'T CRASH!','P1: WASD to steer   |   P2: ARROWS to steer');
  levelData.midMsg=false; levelData.endMsg=false;
  spawnRamen();spawnRamen();spawnRamen();spawnRamen();
}

function spawnRamen(){
  let nx,ny,tries=0;
  do{nx=1+Math.floor(Math.random()*(COLS-2));ny=1+Math.floor(Math.random()*(ROWS-2));tries++;}
  while(tries<30&&[...levelData.snake1,...levelData.snake2,...levelData.ramen].some(s=>s.x===nx&&s.y===ny));
  levelData.ramen.push({x:nx,y:ny,type:Math.random()>0.3?'bowl':'special'});
}

function runLevel3(){
  const d=levelData;
  const anim=frameCount; // alias so any draw call inside has it in scope
  // Japan sky
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#ff9aa2');sky.addColorStop(1,'#ffdac1');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);

  // cherry blossoms
  d.cherries.forEach(c=>{c.y+=c.vy;if(c.y>H)c.y=-10;ctx.fillStyle='#ffb7c5';ctx.beginPath();ctx.arc(c.x,c.y,4,0,Math.PI*2);ctx.fill();});

  // grid
  ctx.strokeStyle='rgba(200,150,120,0.15)';ctx.lineWidth=1;
  for(let gx=0;gx<=W;gx+=CELL){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,H);ctx.stroke();}
  for(let gy=0;gy<=H;gy+=CELL){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke();}

  // input
  if(p1Active()){
    if((keys['w']||keys['W'])&&d.dir1.y!==1) d.nextDir1={x:0,y:-1};
    if((keys['s']||keys['S'])&&d.dir1.y!==-1) d.nextDir1={x:0,y:1};
    if((keys['a']||keys['A'])&&d.dir1.x!==1) d.nextDir1={x:-1,y:0};
    if((keys['d']||keys['D'])&&d.dir1.x!==-1) d.nextDir1={x:1,y:0};
  } else {
    if(keys['ArrowUp']&&d.dir1.y!==1) d.nextDir1={x:0,y:-1};
    if(keys['ArrowDown']&&d.dir1.y!==-1) d.nextDir1={x:0,y:1};
    if(keys['ArrowLeft']&&d.dir1.x!==1) d.nextDir1={x:-1,y:0};
    if(keys['ArrowRight']&&d.dir1.x!==-1) d.nextDir1={x:1,y:0};
  }
  if(p2Active()){
    if(keys['ArrowUp']&&d.dir2.y!==1) d.nextDir2={x:0,y:-1};
    if(keys['ArrowDown']&&d.dir2.y!==-1) d.nextDir2={x:0,y:1};
    if(keys['ArrowLeft']&&d.dir2.x!==1) d.nextDir2={x:-1,y:0};
    if(keys['ArrowRight']&&d.dir2.x!==-1) d.nextDir2={x:1,y:0};
  }

  d.moveTimer++;
  if(d.moveTimer>=d.moveInterval){
    d.moveTimer=0;
    d.dir1={...d.nextDir1}; d.dir2={...d.nextDir2};

    if(p1Active()&&!d.dead1){
      const head1={x:((d.snake1[0].x+d.dir1.x)+COLS)%COLS,y:((d.snake1[0].y+d.dir1.y)+ROWS)%ROWS};
      const hit1=d.snake1.some(s=>s.x===head1.x&&s.y===head1.y)||d.snake2.some(s=>s.x===head1.x&&s.y===head1.y);
      if(hit1){d.dead1=true;lives=Math.max(0,lives-1);screenFlash=20;screenFlashColor='#ff0000';}
      else{
        d.snake1.unshift(head1);
        const ate=d.ramen.find(r=>r.x===head1.x&&r.y===head1.y);
        if(ate){d.ramen.splice(d.ramen.indexOf(ate),1);d.eaten1++;score+=100;spawnHeart(head1.x*CELL,head1.y*CELL);if(d.ramen.length<4)spawnRamen();}
        else d.snake1.pop();
      }
    }
    if(p2Active()&&!d.dead2){
      const head2={x:((d.snake2[0].x+d.dir2.x)+COLS)%COLS,y:((d.snake2[0].y+d.dir2.y)+ROWS)%ROWS};
      const hit2=d.snake2.some(s=>s.x===head2.x&&s.y===head2.y)||d.snake1.some(s=>s.x===head2.x&&s.y===head2.y);
      if(hit2){d.dead2=true;lives=Math.max(0,lives-1);screenFlash=20;screenFlashColor='#ff0000';}
      else{
        d.snake2.unshift(head2);
        const ate=d.ramen.find(r=>r.x===head2.x&&r.y===head2.y);
        if(ate){d.ramen.splice(d.ramen.indexOf(ate),1);d.eaten2++;score+=100;spawnHeart(head2.x*CELL,head2.y*CELL);if(d.ramen.length<4)spawnRamen();}
        else d.snake2.pop();
      }
    }
    if(d.dead1&&!d.respawn1Timer){d.respawn1Timer=frameCount;}
    if(d.dead2&&!d.respawn2Timer){d.respawn2Timer=frameCount;}
    // respawn after 90 frames (~1.5s)
    if(d.dead1&&d.respawn1Timer&&frameCount-d.respawn1Timer>90){
      d.dead1=false;d.respawn1Timer=0;
      d.snake1=[{x:5,y:9},{x:4,y:9},{x:3,y:9}];
      d.dir1={x:1,y:0};d.nextDir1={x:1,y:0};
    }
    if(d.dead2&&d.respawn2Timer&&frameCount-d.respawn2Timer>90){
      d.dead2=false;d.respawn2Timer=0;
      d.snake2=[{x:COLS-5,y:ROWS-9},{x:COLS-4,y:ROWS-9},{x:COLS-3,y:ROWS-9}];
      d.dir2={x:-1,y:0};d.nextDir2={x:-1,y:0};
    }
    if(lives<=0)gameState='gameover';
  }

  // draw ramen items
  d.ramen.forEach(r=>{
    ctx.font='16px serif';ctx.fillText('🍜',r.x*CELL-8,r.y*CELL+8);
  });

  // draw snake 1 (Gorjan -- green)
  d.snake1.forEach((seg,i)=>{
    ctx.fillStyle=i===0?'#00cc55':`rgba(0,${180-i*3},${80-i*2},1)`;
    ctx.fillRect(seg.x*CELL+1,seg.y*CELL+1,CELL-2,CELL-2);
    if(i===0){
      ctx.fillStyle='#fff';ctx.fillRect(seg.x*CELL+4,seg.y*CELL+4,4,4);ctx.fillRect(seg.x*CELL+11,seg.y*CELL+4,4,4);
      ctx.fillStyle='#000';ctx.fillRect(seg.x*CELL+5,seg.y*CELL+5,2,2);ctx.fillRect(seg.x*CELL+12,seg.y*CELL+5,2,2);
    }
  });
  // draw snake 2 (Martela -- purple)
  if(p2Active()) {
  d.snake2.forEach((seg,i)=>{
    ctx.fillStyle=i===0?'#cc44ff':`rgba(${130-i*2},${30},${200-i*3},1)`;
    ctx.fillRect(seg.x*CELL+1,seg.y*CELL+1,CELL-2,CELL-2);
    if(i===0){
      ctx.fillStyle='#fff';ctx.fillRect(seg.x*CELL+4,seg.y*CELL+4,4,4);ctx.fillRect(seg.x*CELL+11,seg.y*CELL+4,4,4);
      ctx.fillStyle='#000';ctx.fillRect(seg.x*CELL+5,seg.y*CELL+5,2,2);ctx.fillRect(seg.x*CELL+12,seg.y*CELL+5,2,2);
    }
  });
  }

  // HUD
  ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(0,0,W,28);
  drawText('GORJAN: '+d.eaten1+'  MARTELA: '+d.eaten2+'  GOAL: '+d.goal,10,20,7,'#ffd700');

  updateDialogue(); drawDialogue();  // floating music notes
  if(!d.songNotes) d.songNotes=[];
  if(!d.songTimer) d.songTimer=0;
  d.songTimer++;
  if(d.songTimer%90===0){ d.songNotes.push({x:20+Math.random()*(W-40),y:H-20,note:['♪','♫','♩'][Math.floor(Math.random()*3)],life:1,vx:(Math.random()-.5)*.6}); }
  d.songNotes=d.songNotes.filter(n=>n.life>0);
  d.songNotes.forEach(n=>{n.y-=0.8;n.x+=n.vx;n.life-=0.005;ctx.globalAlpha=n.life*.7;ctx.fillStyle='#ffd700';ctx.font='13px serif';ctx.fillText(n.note,n.x,n.y);});
  ctx.globalAlpha=1;
  // chef obstacle at halfway
  const total=(p1Active()?d.eaten1:0)+(p2Active()?d.eaten2:0);
  if(total>=9&&!d.chef){d.chef={x:Math.floor(COLS/2),y:Math.floor(ROWS/2),timer:0};queueDialogue('MALINA','MY RAMEN RECIPE IS MINE! YOU SHALL NOT PASS!',160,'#ff4444');}
  if(d.chef&&!d.chefEaten){
    d.chef.timer++;
    if(d.chef.timer%150===0){d.chef.x=1+Math.floor(Math.random()*(COLS-2));d.chef.y=1+Math.floor(Math.random()*(ROWS-2));}
    // red danger tile
    ctx.fillStyle='rgba(255,80,80,0.35)';ctx.fillRect(d.chef.x*CELL-2,d.chef.y*CELL-2,CELL*2+4,CELL*2+4);
    ctx.strokeStyle='#ff4444';ctx.lineWidth=1.5;ctx.strokeRect(d.chef.x*CELL-2,d.chef.y*CELL-2,CELL*2+4,CELL*2+4);
    // draw Malina scaled to fit the cell
    ctx.save(); ctx.scale(0.55,0.55);
    drawMalina((d.chef.x*CELL+CELL)/0.55,(d.chef.y*CELL+CELL*1.2)/0.55,frameCount);
    ctx.restore();
    // name label BELOW the danger zone — correct center, large, never covers the hat
    const mLabel='MALINA';
    ctx.font="8px 'Press Start 2P'";
    const mw=ctx.measureText(mLabel).width;
    const mCX = d.chef.x*CELL + CELL;          // true screen center of character
    const mly = d.chef.y*CELL + CELL*2 + 6;    // below the 2-cell danger box
    ctx.fillStyle='rgba(0,0,0,0.92)'; ctx.fillRect(mCX-mw/2-8,mly,mw+16,18);
    ctx.strokeStyle='#ff4444'; ctx.lineWidth=1.5; ctx.strokeRect(mCX-mw/2-8,mly,mw+16,18);
    drawText(mLabel, mCX-mw/2, mly+13, 8,'#ff4444',false);
    if(d.snake1[0]&&d.snake1[0].x===d.chef.x&&d.snake1[0].y===d.chef.y){d.chefEaten=true;score+=300;spawnHeart(d.chef.x*CELL,d.chef.y*CELL);queueDialogue('GORJAN','Malina down. The ramen is ours.',130,'#00ff88');}
    else if(d.snake2[0]&&d.snake2[0].x===d.chef.x&&d.snake2[0].y===d.chef.y){lives=Math.max(0,lives-1);screenFlash=15;screenFlashColor='#ff0000';}
  }
  if(total===6&&!d.midTalk){d.midTalk=true;queueDialogue('MARTELA','This is the best trip of my life.',160,'#ff69b4');queueDialogue('GORJAN','Wait until you see what I planned next...',180,'#00ff88');}
  if(total>=d.goal){
    startNewsTicker('EASTERN EUROPEAN COUPLE EATS ENTIRE TOKYO RAMEN SUPPLY. LOCAL RESTAURANTS OUT OF STOCK.');
    triggerLevelClear('RAMEN EATEN!\nITASHIMAKITA! ♥\nBEST DATE EVER!');
  }

  if(d.dead1) drawText('P1 DEAD! RESPAWNING...',10,H/2,8,'#ff4444');
  if(d.dead2) drawText('P2 DEAD! RESPAWNING...',10,H/2+24,8,'#ff69b4');
}

// == LEVEL 4: OVERTHINKING FRIENDS -- BUBBLE TROUBLE ================
// ==================================================================
function initLevel4(){
  dialogueQueue=[]; clueboard=[];
  levelData={
    p1:{x:100,y:H-60,bullets:[],shootCool:0,score:0},
    p2:{x:540,y:H-60,bullets:[],shootCool:0,score:0},
    bubbles:[],
    popped:0,goal:10,
    solved:false,
    hitCooldown:0,
    platforms:[{x:0,y:H-40,w:W,h:40},{x:100,y:320,w:120,h:14},{x:350,y:280,w:120,h:14},{x:80,y:230,w:80,h:14},{x:440,y:230,w:80,h:14}],
    jovanX:W/2,jovanY:55,jovanDir:1,
  };
  setNarrator('');
  levelData.startFrame=frameCount;
  showHint('POP ALL OF JOVAN\'S OVERTHINKING BUBBLES!','P1: WASD + SPACE   |   P2: ARROWS + ENTER');
  for(let i=0;i<2;i++) spawnBubble(Math.random()*W,100+Math.random()*100,30+Math.random()*30,1);
}

function spawnBubble(x,y,r,gen){
  if(gen>4||r<10)return;
  const thoughts=['TENT?','DOGS?','SARA??','RAIN?','FOOD?','VEGAN?','PINEAPPLE','RING??','RUN?'];
  levelData.bubbles.push({
    x,y,r,gen,alive:true,
    vx:(Math.random()>.5?1:-1)*(2-gen*0.3),
    vy:-(2+Math.random()),
    thought:thoughts[Math.floor(Math.random()*thoughts.length)],
    col:['#ff88aa','#ffaa44','#88aaff','#ff6644','#aa88ff'][Math.floor(Math.random()*5)],
  });
}

function runLevel4(){
  const d=levelData;
  // night sky / city bg
  ctx.fillStyle='#080814';ctx.fillRect(0,0,W,H);
  for(let i=0;i<20;i++){const rx=(frameCount*2+i*47)%W;const ry=(frameCount*4+i*31)%H;ctx.fillStyle='rgba(100,150,255,0.25)';ctx.fillRect(rx,ry,1,5);}
  [0,90,190,300,400,500].forEach((bx,i)=>{
    const bh=80+(i*53)%120;
    ctx.fillStyle='#0d0d1e';ctx.fillRect(bx,H-40-bh,80,bh);
    for(let wx=6;wx<70;wx+=16)for(let wy=10;wy<bh-10;wy+=22)
      if((bx+wx+wy)%3!==0){ctx.fillStyle='rgba(255,220,100,0.3)';ctx.fillRect(bx+wx,H-40-bh+wy,8,10);}
  });
  ctx.fillStyle='#151525';ctx.fillRect(0,H-40,W,40);
  d.platforms.forEach(pl=>{
    ctx.fillStyle='#1a1a30';ctx.fillRect(pl.x,pl.y,pl.w,pl.h);
    ctx.fillStyle='#2a2a50';ctx.fillRect(pl.x,pl.y,pl.w,3);
  });
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,28);
  drawText('BUBBLES: '+d.popped+'/'+d.goal,10,20,7,'#88aaff');

  // Jovan generating thought bubbles
  d.jovanX += d.jovanDir * 0.8;
  if(d.jovanX < 60 || d.jovanX > W-60) d.jovanDir *= -1;
  drawJovan(d.jovanX, d.jovanY, frameCount);
  // Jovan brain sparks
  if(frameCount%90===0 && d.popped < d.goal){
    spawnBubble(d.jovanX+(Math.random()-0.5)*60, d.jovanY+50, 22+Math.random()*18, 1);
    ctx.fillStyle='rgba(255,200,50,0.4)';
    ctx.beginPath();ctx.arc(d.jovanX,d.jovanY+40,30,0,Math.PI*2);ctx.fill();
  }

  updateDialogue(); drawDialogue();
  // bubbles
  d.bubbles.forEach(b=>{
    if(!b.alive)return;
    b.x+=b.vx;b.y+=b.vy;b.vy+=0.06;
    if(b.x-b.r<0){b.x=b.r;b.vx=Math.abs(b.vx);}
    if(b.x+b.r>W){b.x=W-b.r;b.vx=-Math.abs(b.vx);}
    d.platforms.forEach(pl=>{
      if(b.y+b.r>pl.y&&b.y-b.r<pl.y+pl.h&&b.x>pl.x&&b.x<pl.x+pl.w&&b.vy>0){b.vy=-Math.abs(b.vy)*0.85;}
    });
    if(b.y-b.r<0){b.vy=Math.abs(b.vy)*0.8;}
    ctx.globalAlpha=0.7;
    ctx.fillStyle=b.col;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=0.3;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(b.x-b.r*.3,b.y-b.r*.3,b.r*.35,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.stroke();
    drawText(b.thought,b.x-20,b.y+4,5,'#fff',true);
  });

  function moveShooter(p,lk,rk,jk,sk,skalt){
    if(keys[lk]) p.x=Math.max(20,p.x-3.2);
    if(keys[rk]) p.x=Math.min(W-20,p.x+3.2);
    p.shootCool--;
    if((keys[sk]||keys[skalt])&&p.shootCool<=0){
      p.bullets.push({x:p.x,y:p.y-20,alive:true});
      p.shootCool=15;
    }
  }
  if(p1Active()) moveShooter(d.p1,'a','d','w',' ','f');
  if(p2Active()) moveShooter(d.p2,'ArrowLeft','ArrowRight','ArrowUp','Enter','0');
  if(!p1Active()){ moveShooter(d.p1,'ArrowLeft','ArrowRight','ArrowUp','Enter','0'); }

  [d.p1,d.p2].forEach((p,pi)=>{
    p.bullets.forEach(b=>{
      if(!b.alive)return;
      b.y-=8;
      ctx.fillStyle=pi===0?'#00ff88':'#ff69b4';ctx.fillRect(b.x-2,b.y,4,14);
      if(b.y<-20){b.alive=false;return;}
      d.bubbles.forEach(bl=>{
        if(!bl.alive)return;
        if(Math.sqrt((b.x-bl.x)**2+(b.y-bl.y)**2)<bl.r+4){
          b.alive=false;bl.alive=false;d.popped++;score+=150;
          spawnHeart(bl.x,bl.y);
          if(bl.r>14&&bl.gen<3){
            spawnBubble(bl.x-bl.r/2,bl.y,bl.r*.6,bl.gen+1);
            spawnBubble(bl.x+bl.r/2,bl.y,bl.r*.6,bl.gen+1);
          }
          if(d.bubbles.filter(bb=>bb.alive).length<2&&d.popped<d.goal) spawnBubble(Math.random()*W,50,30+Math.random()*20,1);
        }
      });
    });
    p.bullets.splice(0,p.bullets.length,...p.bullets.filter(b=>b.alive));
    if(pi===0&&p1Active()) drawGorjan(p.x,H-70,1,frameCount);
    else if(pi===1&&p2Active()) drawMartela(p.x,H-70,1,frameCount);
  });

  d.bubbles.forEach(b=>{
    if(!b.alive)return;
    var l4players=[];
    if(p1Active()) l4players.push(d.p1);
    if(p2Active()) l4players.push(d.p2);
    if(!p1Active()) l4players.push(d.p1);
    d.hitCooldown=Math.max(0,(d.hitCooldown||0)-1);
    l4players.forEach(p=>{
      if(d.hitCooldown>0) return;
      if(Math.sqrt((p.x-b.x)**2+((H-70)-b.y)**2)<b.r+14){
        lives=Math.max(0,lives-1);screenFlash=15;screenFlashColor='#ff0000';
        d.hitCooldown=120; // ~2s invincibility after hit
        spawnParticle(p.x,p.y-30,'#ff4444',8,4);
        if(lives<=0)gameState='gameover';
      }
    });
  });

  if(d.popped>=d.goal&&!d.solved){
    d.solved=true;
    queueDialogue('JOVAN','...okay I think I am fine now. Mostly. Sara still worries me.',220,'#d4a017');
    triggerLevelClear('JOVAN CHILLED OUT!\nAIR CLEARED!\n\nFRIENDS: HAPPY\nANXIETY: DEFEATED ♥');
  }
}

// == LEVEL 5: JOANA'S QUOTA CHAOS -- CATCH THE DRINKS ===============
// ==================================================================
function initLevel5(){
  levelData={
    p1:{x:160,y:H-80},
    p2:{x:480,y:H-80},
    bottles:[],spawnTimer:0,
    caught:0,goal:20,
    joana:{x:W/2,y:72,vx:2.2},
    startFrame:frameCount,
    quota:0,  // Joana's rage meter
  };
  setNarrator('');
  showHint('CATCH THE DRINKS JOANA IS THROWING!','P1: A/D to move   |   P2: ARROWS to move   |   Don\'t let bottles hit the floor!');
  for(let i=0;i<4;i++) spawnBottle();
}

// Coca-Cola company products — bottle types
const BOTTLES=[
  {name:'COKE',   col:'#cc0000', cap:'#880000'},
  {name:'SPRITE', col:'#00aa44', cap:'#007733'},
  {name:'FANTA',  col:'#ff7700', cap:'#cc5500'},
  {name:'SCHWEPPES', col:'#c8b400', cap:'#998800'},
  {name:'POWERADE', col:'#0055cc', cap:'#003399'},
  {name:'DASANI',   col:'#44aadd', cap:'#2288bb'},
  {name:'MINUTE MAID', col:'#ff9900', cap:'#cc7700'},
];

function spawnBottle(fromX, fromY){
  const bt=BOTTLES[Math.floor(Math.random()*BOTTLES.length)];
  levelData.bottles.push({
    x: fromX!==undefined ? fromX : 30+Math.random()*(W-60),
    y: fromY!==undefined ? fromY : -40-Math.random()*60,
    vy: 1.8+Math.random()*1.4+(levelData.caught/50)*0.4,
    vx: (Math.random()-0.5)*1.2,
    ...bt, alive:true, wobble:Math.random()*Math.PI*2,
  });
}

function drawBottle(x,y,col,cap,name){
  const bx=Math.round(x), by=Math.round(y);
  // bottle body
  ctx.fillStyle=col; ctx.strokeStyle='#000'; ctx.lineWidth=1.5;
  roundRect(bx-8,by-16,16,28,3); ctx.fill(); ctx.stroke();
  // bottle neck
  ctx.fillStyle=col;
  roundRect(bx-4,by-28,8,14,2); ctx.fill(); ctx.stroke();
  // cap
  ctx.fillStyle=cap;
  ctx.fillRect(bx-5,by-34,10,8); ctx.strokeRect(bx-5,by-34,10,8);
  // label text on bottle
  ctx.save();
  ctx.font="bold 4px 'Press Start 2P'";
  ctx.fillStyle='#fff'; ctx.textAlign='center';
  ctx.fillText(name.split(' ')[0], bx, by-2);
  ctx.restore();
  // shine
  ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.fillRect(bx-5,by-14,3,18);
}

function runLevel5(){
  const d=levelData;

  // venue background
  const gr=ctx.createLinearGradient(0,0,0,H);
  gr.addColorStop(0,'#1a0a2e');gr.addColorStop(1,'#0a0015');
  ctx.fillStyle=gr;ctx.fillRect(0,0,W,H);
  // warehouse feel - stacked crates
  for(let cx=0;cx<W;cx+=80){
    ctx.fillStyle='#2a1a0a'; ctx.strokeStyle='#1a0a00'; ctx.lineWidth=1;
    ctx.fillRect(cx,H-100,75,100); ctx.strokeRect(cx,H-100,75,100);
    ctx.fillRect(cx+4,H-196,67,95); ctx.strokeRect(cx+4,H-196,67,95);
    ctx.strokeStyle='#3a2a1a';
    ctx.beginPath();ctx.moveTo(cx,H-100);ctx.lineTo(cx+75,H-100);ctx.stroke();
  }
  ctx.fillStyle='#111';ctx.fillRect(0,H-50,W,50);
  // floor stripe
  ctx.fillStyle='#ffd700';ctx.fillRect(0,H-52,W,3);

  // spawn bottles
  d.spawnTimer++;
  if(d.spawnTimer>50&&d.bottles.filter(b=>b.alive).length<8){
    spawnBottle(d.joana.x+(Math.random()-0.5)*40, d.joana.y+30);
    d.spawnTimer=0;
  }

  // bottles fall
  d.bottles.forEach(bottle=>{
    if(!bottle.alive)return;
    bottle.x+=bottle.vx; bottle.y+=bottle.vy;
    bottle.wobble+=0.05;
    if(bottle.x<20||bottle.x>W-20) bottle.vx*=-1;
    drawBottle(bottle.x, bottle.y, bottle.col, bottle.cap, bottle.name);
    if(bottle.y>H+20){
      bottle.alive=false;
      // missed bottle = stress
      d.quota=Math.min(100,d.quota+8);
      screenFlash=6; screenFlashColor='#ff8800';
      spawnParticle(bottle.x,H-50,bottle.col,6,3);
    }
    // catch
    var l5players=[];
    if(p1Active()) l5players.push(d.p1);
    if(p2Active()) l5players.push(d.p2);
    if(!p1Active()) l5players.push(d.p1);
    l5players.forEach(p=>{
      if(Math.abs(p.x-bottle.x)<28&&Math.abs((H-80)-bottle.y)<40&&bottle.alive){
        bottle.alive=false;
        d.caught++; score+=120;
        spawnHeart(bottle.x,bottle.y);
        if(d.caught%5===0) queueDialogue('JOANA',['QUOTA MET!','EXCELLENT!','BUY MORE!','KEEP GOING!'][Math.floor(Math.random()*4)],80,'#ff4444');
      }
    });
  });

  // Joana bounces at top throwing bottles
  d.joana.x+=d.joana.vx;
  if(d.joana.x<60||d.joana.x>W-60) d.joana.vx*=-1;
  drawJoana(d.joana.x, d.joana.y, frameCount);

  // Joana rage lines
  if(!d.joanaTimer) d.joanaTimer=0;
  if(!d.joanaIdx) d.joanaIdx=0;
  d.joanaTimer++;
  const joanaLines=[
    'I NEED TO MEET MY QUARTERLY QUOTAS!',
    'YOU ARE BUYING ALL OF THE COKE!',
    'THE SPREADSHEET DEMANDS IT.',
    'FORTY-SEVEN PAGES. COLOUR CODED.',
    'COKE. SPRITE. FANTA. ALL OF IT.',
    'THIS IS NOT NEGOTIABLE.',
  ];
  if(d.joanaTimer%500===0&&d.joanaIdx<joanaLines.length){
    queueDialogue('JOANA',joanaLines[d.joanaIdx],180,'#ff4444');
    d.joanaIdx++;
  }

  // player movement
  var l5p1max=p2Active()?W/2-10:W-20;
  if(keys['a']||keys['A']) d.p1.x=Math.max(20,d.p1.x-4);
  if(keys['d']||keys['D']) d.p1.x=Math.min(l5p1max,d.p1.x+4);
  if(!p1Active()){
    if(keys['ArrowLeft']) d.p1.x=Math.max(20,d.p1.x-4);
    if(keys['ArrowRight']) d.p1.x=Math.min(W-20,d.p1.x+4);
  }
  if(p2Active()){
    if(keys['ArrowLeft']) d.p2.x=Math.max(W/2+10,d.p2.x-4);
    if(keys['ArrowRight']) d.p2.x=Math.min(W-20,d.p2.x+4);
  }

  if(p1Active()) drawGorjan(d.p1.x,H-78,1,frameCount);
  if(p2Active()) drawMartela(d.p2.x,H-78,1,frameCount);
  if(!p1Active()) drawMartela(d.p1.x,H-78,1,frameCount);

  // HUD
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,28);
  drawText('CAUGHT: '+d.caught+'/'+d.goal,10,20,7,'#ffd700');
  // quota / stress meter
  const qcol=d.quota>70?'#ff4444':d.quota>40?'#ffaa00':'#00ff88';
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(W-170,8,160,13);
  ctx.fillStyle=qcol;ctx.fillRect(W-170,8,Math.round(160*d.quota/100),13);
  ctx.strokeStyle='#555';ctx.lineWidth=1;ctx.strokeRect(W-170,8,160,13);
  drawText('QUOTA '+Math.round(d.quota)+'%',W-168,18,5,qcol,false);

  if(d.quota>=100){lives=Math.max(0,lives-1);d.quota=40;screenFlash=20;screenFlashColor='#ff8800';}

  updateDialogue(); drawDialogue();
  if(d.caught>=d.goal) triggerLevelClear('QUOTA FULFILLED!\nJOANA IS SATISFIED.\nFOR NOW.\n\n♥ WEDDING BAR: STOCKED ♥');
  if(lives<=0)gameState='gameover';
}

// == LEVEL 6: WINDOWS 95 -- BREAKOUT/PONG ===========================
// ==================================================================
function initLevel6(){
    levelData={
    ball:{x:W/2,y:H/2,vx:3,vy:-3.5,r:8},
    dora:{x:200,y:180,vx:-1.4,vy:0.8,hp:2},
    pad1:{x:80,w:90,y:H-50},   // P1 bottom left half
    pad2:{x:480,w:90,y:H-50},  // P2 bottom right half
    bricks:[],
    broken:0,goal:0,
    vladHP:6,vladX:W/2,vladY:80,vladVX:1.8,vladPhase:'normal',
    bossDefeated:false,
    popups:[],popupTimer:0,
    lives3:3,
  };
  // Error popups as bricks
  const errors=['ERROR','CRASH','BSOD','FAIL','VLAD','DORA','BUG','VIRUS'];
  for(let row=0;row<4;row++){
    for(let col=0;col<8;col++){
      levelData.bricks.push({x:60+col*70,y:100+row*36,w:62,h:28,alive:true,hits:row<2?1:2,label:errors[(row*8+col)%errors.length],color:['#ff4444','#ff8800','#0000cc','#008080'][row]});
    }
  }
  levelData.goal=levelData.bricks.length;
  setNarrator('');
  levelData.bsodTimer=0; levelData.bsodActive=false;
  levelData.startFrame=frameCount;
  showHint('SMASH THE BRICKS — DEFEAT VLAD.EXE!','P1: A/D to move   |   P2: ARROWS to move');
}

function runLevel6(){
  const d=levelData;
  // Win95 desktop teal
  ctx.fillStyle='#008080';ctx.fillRect(0,0,W,H);
  // desktop icons
  ['💾','🖥','🗑','📁'].forEach((ic,i)=>{
    ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fillRect(8,45+i*58,44,44);
    ctx.font='20px serif';ctx.fillText(ic,12,75+i*58);
    drawText(['DISK','PC','BIN','DOCS'][i],8,84+i*58,4,'#fff',false);
  });
  // taskbar
  ctx.fillStyle='#c0c0c0';ctx.fillRect(0,H-28,W,28);
  ctx.fillStyle='#dfdfdf';ctx.fillRect(0,H-28,W,2);
  ctx.fillStyle='#c0c0c0';ctx.fillRect(2,H-26,64,24);
  ctx.fillStyle='#dfdfdf';ctx.fillRect(2,H-26,64,2);ctx.fillRect(2,H-26,2,24);
  ctx.fillStyle='#808080';ctx.fillRect(64,H-26,2,24);ctx.fillRect(2,H-4,64,2);
  ctx.font='12px serif';ctx.fillText('🪟',6,H-10);
  drawText('START',24,H-10,6,'#000',false);
  drawText('00:'+String(Math.floor(frameCount/60)%60).padStart(2,'0'),W-58,H-10,6,'#000',false);

  // bricks
  d.bricks.forEach(br=>{
    if(!br.alive)return;
    ctx.fillStyle=br.color;ctx.fillRect(br.x,br.y,br.w,br.h);
    ctx.fillStyle='#dfdfdf';ctx.fillRect(br.x,br.y,br.w,2);ctx.fillRect(br.x,br.y,2,br.h);
    ctx.fillStyle='#808080';ctx.fillRect(br.x+br.w-2,br.y,2,br.h);ctx.fillRect(br.x,br.y+br.h-2,br.w,2);
    ctx.fillStyle='#000080';
    if(br.color==='#0000cc'||br.color==='#008080') ctx.fillStyle='#fff';
    drawText(br.label,br.x+4,br.y+br.h-6,5,ctx.fillStyle,false);
    if(br.hits>1){ctx.fillStyle='#ffd700';ctx.fillRect(br.x+br.w-10,br.y+2,8,8);}
  });

  // ball
  const ball=d.ball;
  ball.x+=ball.vx;ball.y+=ball.vy;
  // wall bounce
  if(ball.x-ball.r<0){ball.x=ball.r;ball.vx=Math.abs(ball.vx);}
  if(ball.x+ball.r>W){ball.x=W-ball.r;ball.vx=-Math.abs(ball.vx);}
  if(ball.y-ball.r<28){ball.y=28+ball.r;ball.vy=Math.abs(ball.vy);}
  // fell off bottom
  if(ball.y>H){
    lives=Math.max(0,lives-1);screenFlash=20;screenFlashColor='#0000ff';
    ball.x=W/2;ball.y=H/2;ball.vx=3*(Math.random()>.5?1:-1);ball.vy=-3.5;
    if(lives<=0)gameState='gameover';
  }
  // pad bounce
  [d.pad1,d.pad2].forEach(pad=>{
    if(ball.y+ball.r>pad.y&&ball.y+ball.r<pad.y+14&&ball.x>pad.x&&ball.x<pad.x+pad.w&&ball.vy>0){
      ball.vy=-Math.abs(ball.vy);ball.vx+=(ball.x-(pad.x+pad.w/2))*0.08;
      spawnParticle(ball.x,pad.y,'#00ff88',6,3);
    }
  });
  // brick collision
  d.bricks.forEach(br=>{
    if(!br.alive)return;
    if(ball.x>br.x&&ball.x<br.x+br.w&&ball.y-ball.r<br.y+br.h&&ball.y+ball.r>br.y){
      br.hits--;
      if(br.hits<=0){br.alive=false;d.broken++;score+=80;spawnHeart(br.x+br.w/2,br.y);}
      ball.vy*=-1;
    }
  });
  // draw ball
  ctx.fillStyle='#ff4444';ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ff8888';ctx.beginPath();ctx.arc(ball.x-2,ball.y-2,ball.r*.4,0,Math.PI*2);ctx.fill();

  // pads
  if(p2Active()){
    if(keys['a']||keys['A']) d.pad1.x=Math.max(0,d.pad1.x-5);
    if(keys['d']||keys['D']) d.pad1.x=Math.min(W/2-d.pad1.w,d.pad1.x+5);
    if(keys['ArrowLeft']) d.pad2.x=Math.max(W/2,d.pad2.x-5);
    if(keys['ArrowRight']) d.pad2.x=Math.min(W-d.pad2.w,d.pad2.x+5);
  } else {
    var soloKeys=p1Active();
    var lk=soloKeys?'a':'ArrowLeft', rk=soloKeys?'d':'ArrowRight';
    d.pad1.x=Math.max(0,Math.min(W-d.pad1.w,d.pad1.x+(keys[rk]?5:0)-(keys[lk]?5:0)));
    d.pad1.w=180; d.pad2.x=-999;
  }
  var l6pads=p2Active()?[d.pad1,d.pad2]:[d.pad1];
  l6pads.forEach((pad,pi)=>{
    const col=pi===0?'#00ff88':'#ff69b4';
    ctx.fillStyle=col;ctx.fillRect(pad.x,pad.y,pad.w,12);
    ctx.fillStyle='#fff';ctx.fillRect(pad.x+2,pad.y+2,pad.w-4,3);
    drawText(pi===0?'P1':'P2',pad.x+pad.w/2-10,pad.y-10,6,col);
  });

  // Dora - steals bricks back (bounces around, if ball hits her she re-seals a brick)
  d.dora.x+=d.dora.vx; d.dora.y+=d.dora.vy;
  if(d.dora.x<30||d.dora.x>W-30) d.dora.vx*=-1;
  if(d.dora.y<40||d.dora.y>300) d.dora.vy*=-1;
  if(d.dora.hp>0){
    drawDora(d.dora.x,d.dora.y,frameCount);
    if(Math.sqrt((ball.x-d.dora.x)**2+(ball.y-d.dora.y)**2)<36){
      d.dora.hp--; ball.vy=-Math.abs(ball.vy);
      spawnParticle(d.dora.x,d.dora.y,'#d49060',10,5);
      screenFlash=8; screenFlashColor='#d49060';
      if(d.dora.hp<=0){
        spawnParticle(d.dora.x,d.dora.y,'#ffd700',15,7); score+=300;
        queueDialogue('DORA','Fine. I was trying to put the virus back IN. On behalf of Emir.',200,'#d49060');
      }
    }
    for(let i=0;i<d.dora.hp;i++){ctx.fillStyle='#d49060';ctx.fillRect(d.dora.x-10+i*14,d.dora.y-48,12,6);}
  }

  // Vladimir -- virus boss at top
  if(!d.bossDefeated&&d.broken>10){
    d.vladX+=d.vladVX+(5-Math.max(0,d.vladHP))*0.4;
    if(d.vladX<40||d.vladX>W-40)d.vladVX*=-1;
    drawVladimir(d.vladX,d.vladY,frameCount,d.vladHP<=3);
    if(Math.sqrt((ball.x-d.vladX)**2+(ball.y-d.vladY)**2)<40){
      d.vladHP--;ball.vy=Math.abs(ball.vy);spawnParticle(d.vladX,d.vladY,'#00ff44',12,6);screenFlash=8;screenFlashColor='#00ff44';
      if(d.vladHP<=0){d.bossDefeated=true;spawnParticle(d.vladX,d.vladY,'#ffd700',25,10);score+=800;
        queueDialogue('VLAD','The virus... was just trying to... make friends...',180,'#ff4444');
        startNewsTicker('VLAD.EXE DEFEATED. PC RESTORED. WEDDING SLIDESHOW SAVED. DORA.EXE QUARANTINED.');}
    }
    for(let i=0;i<Math.max(0,d.vladHP);i++){ctx.fillStyle=d.vladHP<=3?'#00ff44':'#ff4444';ctx.fillRect(d.vladX-30+i*12,d.vladY-42,10,6);}
  }

  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(0,0,W,28);
  drawText(`BRICKS: ${d.broken}/${d.goal} LIVES: ${'♥'.repeat(lives)}`,10,20,7,'#00ff44');

  updateDialogue(); drawDialogue();
  if(frameCount%300===0&&!d.bossDefeated){
    const dq=['THE VIRUS IS SPREADING','ERROR 404: WEDDING NOT FOUND','DORA.EXE PANICKING','THIS IS NOT MY FAULT (IT IS)','VLAD IS EVERYWHERE'];
    queueDialogue('DORA',dq[Math.floor(Math.random()*dq.length)],100,'#d49060');
  }
  // Mid-level BSOD flash
  if(d.broken===16&&!d.bsodActive){d.bsodActive=true;d.bsodTimer=60;}
  if(d.bsodTimer>0){
    d.bsodTimer--;
    ctx.fillStyle='#0000aa'; ctx.fillRect(0,0,W,H);
    drawTextC(':(', 120, 60,'#fff');
    drawTextC('YOUR PC RAN INTO A PROBLEM',180,8,'#fff');

  }
  const allBricks=d.bricks.every(b=>!b.alive);

  if(!d.bsodDone&&d.broken>=Math.floor(d.goal/2)){
    d.bsodDone=true;

    setNarrator('BSOD!\n\nDORA.EXE caused\na problem.\nVLAD helped.\n\nPress SPACE/ENTER\nto dismiss!\nBall speeds up after!');
  }
  if(d.bsodDone&&(d.bsodTimer||0)<200&&d.bsodActive!==false){
    if(!d.bsodShowing) d.bsodShowing=true;
    d.bsodTimer=(d.bsodTimer||0)+1;
    ctx.fillStyle='rgba(0,0,200,0.88)'; ctx.fillRect(0,0,W,H);
    drawTextC('A PROBLEM HAS OCCURRED',140,8,'#fff');
    drawTextC('DORA_LAPTOP.EXE',170,7,'#fff');
    drawTextC('STOP: 0x0000DORA',195,6,'#aaa');
    drawTextC('COLLECTED ERRORS: '+d.broken,220,6,'#aaa');
    drawTextC('PRESS SPACE/ENTER TO CONTINUE',260,6,'#fff');
    if((keys[' ']||keys['Enter'])){d.bsodActive=false;d.bsodShowing=false;d.ball.vx*=1.15;d.ball.vy*=1.15;}
    return;
  }
  if(allBricks&&d.bossDefeated) triggerLevelClear('WINDOWS FIXED!\nVLAD.EXE DELETED!\nDORA GROUNDED!');
  else if(allBricks) {setNarrator('BRICKS DONE!\nNow hit VLAD\nwith the ball!');}
}

function runLevel8(){
  const d=levelData;
  const pl=d.p1;
  const em=d.emir;
  const phase=em.hp>6?1:em.hp>3?2:3;

  // Background
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#1a0000');sky.addColorStop(1,'#3a1010');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
  for(let i=0;i<8;i++){const fx=i*80+Math.sin(frameCount*.05+i)*10;ctx.fillStyle=`rgba(255,${80+i*8},0,0.25)`;ctx.fillRect(fx,H-80,60,30+Math.sin(frameCount*.08+i)*12);}
  d.platforms.forEach(p=>{ctx.fillStyle='#2a1a1a';ctx.fillRect(p.x,p.y,p.w,p.h);ctx.fillStyle='#3a2a2a';ctx.fillRect(p.x,p.y,p.w,3);});
  ctx.fillStyle='#3a0808';ctx.fillRect(0,H-60,W,60);
  for(let lx=0;lx<W;lx+=20){ctx.fillStyle=`rgba(255,${60+Math.sin(frameCount*.1+lx)*25},0,0.4)`;ctx.fillRect(lx,H-60,14,5);}

  // Martela in tower
  if(!d.rescued){
    ctx.fillStyle='#1a1a2a';ctx.fillRect(W-90,80,80,100);
    ctx.strokeStyle='#888';ctx.lineWidth=2;ctx.strokeRect(W-90,80,80,100);
    for(let bi=0;bi<5;bi++){ctx.strokeStyle='#666';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(W-88+bi*16,82);ctx.lineTo(W-88+bi*16,178);ctx.stroke();}
    drawMartela(W-50,150,1,0,true);
  }

  // ── EMIR AI + PHYSICS ─────────────────────────────────────────────
  if(em.hp>0){
    em.stateTimer++;
    em.dashCool=Math.max(0,em.dashCool-1);
    em.jumpCool=Math.max(0,em.jumpCool-1);
    em.shootTimer++;

    const dx=pl.x-em.x, dy=pl.y-em.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const playerAbove = pl.y < em.y-20 && Math.abs(dx)<80;
    const spd = 1.2+phase*0.5;

    // ── AI state machine ───────────────────────────────────────────
    if(em.state==='patrol'){
      // Move toward or away from player
      if(playerAbove && em.grounded && em.dashCool===0){
        // DODGE: player is jumping above — dash sideways fast
        em.vx = dx>0 ? -5 : 5;
        em.dashCool=40;
        em.state='dodge';
        em.stateTimer=0;
        if(phase>=2) screenFlash=3;screenFlashColor='#ff8800';
      } else {
        // Chase at medium distance, back off if too close
        if(dist>200){em.vx+=(dx>0?0.3:-0.3);}
        else if(dist<80){em.vx+=(dx>0?-0.3:0.3);}
        else{em.vx*=0.9;}
        // Shoot
        const shootRate=phase===1?80:phase===2?50:28;
        if(em.shootTimer>shootRate&&dist<350){
          fireEmir(em,pl,phase,d);
          em.shootTimer=0;
          if(phase===3){em.state='burst';em.stateTimer=0;}
        }
        // Jump to a platform occasionally
        if(em.grounded&&em.jumpCool===0&&(Math.random()<0.008||playerAbove)){
          em.vy=-10-phase*0.8;
          em.grounded=false;
          em.jumpCool=90;
        }
      }
    } else if(em.state==='dodge'){
      em.vx*=0.88;
      if(em.stateTimer>30){em.state='patrol';em.stateTimer=0;}
    } else if(em.state==='burst'){
      // Phase 3: rapid burst then cooldown
      if(em.stateTimer%12===0&&em.stateTimer<48){
        fireEmir(em,pl,phase,d);
      }
      if(em.stateTimer>60){em.state='patrol';em.stateTimer=0;}
    } else if(em.state==='dash'){
      // Phase 2+: charge toward player
      em.vx = dx>0?7:-7;
      if(em.stateTimer>20){em.state='patrol';em.stateTimer=0;}
    }

    // Phase 2: occasionally charge at player
    if(phase>=2&&em.grounded&&em.dashCool===0&&Math.random()<0.004){
      em.state='dash';em.stateTimer=0;em.dashCool=120;
      queueDialogue('EMIR','...',40,'#ff4444');
    }

    // Apply velocity + friction
    em.vx=Math.max(-7,Math.min(7,em.vx));
    em.vx*=0.85;
    em.vy+=0.5;
    em.x+=em.vx;
    em.y+=em.vy;
    em.x=Math.max(10,Math.min(W-10,em.x));
    em.facing = em.vx<-0.1?-1:em.vx>0.1?1:em.facing;

    // Platform collision for Emir
    em.grounded=false;
    d.platforms.forEach(p=>{
      if(em.x>p.x&&em.x<p.x+p.w&&em.y+18>p.y&&em.y+18<p.y+p.h+Math.abs(em.vy)+2&&em.vy>=0){
        em.y=p.y-18;em.vy=0;em.grounded=true;
      }
    });
    if(em.y>H+40){em.x=300;em.y=200;em.vy=0;}

    drawEmir(em.x,em.y,frameCount);

    // HP pips
    for(let i=0;i<em.hp;i++){
      ctx.fillStyle=phase===3?'#ff2200':phase===2?'#ff6600':'#ff4444';
      ctx.fillRect(em.x-44+i*10,em.y-54,8,6);
      ctx.strokeStyle='#000';ctx.lineWidth=1;ctx.strokeRect(em.x-44+i*10,em.y-54,8,6);
    }
    if(phase>1){
      drawText(phase===3?'ENRAGED!':'ANGRY!',em.x-22,em.y-62,5,phase===3?'#ff2200':'#ff8800');
    }

    // Stomp detection — Gorjan jumps ON Emir from above
    if(Math.abs(pl.x-em.x)<32&&Math.abs(pl.y-em.y)<36&&pl.vy<-2){
      em.hp--;
      pl.vy=-10;
      spawnParticle(em.x,em.y,'#ff4444',14,7);
      screenFlash=12;screenFlashColor='#fff';
      if(em.hp===6) queueDialogue('EMIR','You dare! I have a GUN!',140,'#ff4444');
      if(em.hp===3) queueDialogue('EMIR','STOP MOVING!!',120,'#ff4444');
      if(em.hp<=0){
        spawnParticle(em.x,em.y,'#ffd700',30,10);
        spawnParticle(em.x,em.y,'#ff69b4',20,7);
        d.rescued=true;d.victoryTimer=0;score+=2000;
        queueDialogue('EMIR','The hat... protect the hat...',180,'#ff4444');
      }
    } else if(Math.abs(pl.x-em.x)<32&&Math.abs(pl.y-em.y)<36&&pl.vy>=0){
      lives=Math.max(0,lives-1);screenFlash=15;screenFlashColor='#ff0000';pl.x=30;pl.vy=-5;
    }
  }

  // ── BULLETS ────────────────────────────────────────────────────────
  d.bullets=d.bullets.filter(b=>b.alive&&b.y<H+20&&b.x>-20&&b.x<W+20);
  d.bullets.forEach(b=>{
    b.x+=b.vx;b.y+=b.vy;
    ctx.fillStyle='#ff6600';ctx.beginPath();ctx.arc(b.x,b.y,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffee00';ctx.beginPath();ctx.arc(b.x,b.y,2,0,Math.PI*2);ctx.fill();
    if(Math.abs(b.x-pl.x)<12&&Math.abs(b.y-pl.y)<18){
      b.alive=false;lives=Math.max(0,lives-1);screenFlash=14;screenFlashColor='#ff4444';
      if(lives<=0)gameState='gameover';
    }
  });

  // ── VICTORY ────────────────────────────────────────────────────────
  if(d.rescued){
    d.victoryTimer++;
    drawMartela(W-50,H-100,-1,frameCount);
    ctx.fillStyle='rgba(0,0,0,0.88)';ctx.fillRect(60,60,W-120,80);
    ctx.strokeStyle='#ffd700';ctx.lineWidth=2;ctx.strokeRect(60,60,W-120,80);
    drawTextC('MARTELA IS FREE!',90,10,'#ffd700');
    drawTextC('GORJAN IS A HERO! ♥',112,8,'#ff69b4');
    drawTextC('MARTELA: "I LOVE YOU."',140,7,'#ff69b4');
    drawTextC('GORJAN: "I KNOW." ♥',160,7,'#ffd700');
    if(d.victoryTimer>180) triggerLevelClear('GORJAN SAVED\nMARTELA!\nTRUE LOVE WINS! ♥');
  }

  // ── PLAYER PHYSICS ─────────────────────────────────────────────────
  if(keys['a']||keys['A']){pl.vx=-pl.speed;pl.facing=-1;pl.frame++;}
  else if(keys['d']||keys['D']){pl.vx=pl.speed;pl.facing=1;pl.frame++;}
  else pl.vx*=0.75;
  if((keys['w']||keys['W'])&&pl.grounded){pl.vy=-9;pl.grounded=false;}
  pl.vy+=0.45;pl.x+=pl.vx;pl.y+=pl.vy;
  pl.x=Math.max(10,Math.min(W-10,pl.x));
  pl.grounded=false;
  d.platforms.forEach(p=>{if(pl.x>p.x&&pl.x<p.x+p.w&&pl.y+18>p.y&&pl.y+18<p.y+p.h+Math.abs(pl.vy)+2&&pl.vy>=0){pl.y=p.y-18;pl.vy=0;pl.grounded=true;}});
  if(pl.y>H+50){pl.x=30;pl.y=200;pl.vy=0;lives=Math.max(0,lives-1);screenFlash=15;screenFlashColor='#ff0000';if(lives<=0)gameState='gameover';}

  drawGorjan(pl.x,pl.y,pl.facing,pl.frame);

  // ── HUD ─────────────────────────────────────────────────────────────
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,28);
  drawText('GORJAN SOLO!',10,20,7,'#ffd700');
  drawText('LIVES: '+'♥'.repeat(lives),W-130,20,7,'#ff4444');
  if(em.hp>0) drawTextC('JUMP ON EMIR TO DAMAGE — DODGE THE BULLETS!',H/2,5,'#ff4444');
  if(!d.rescued&&!d.cageChat&&pl.x>W-180){
    d.cageChat=true;
    queueDialogue('MARTELA','Gorjan! Over here!',150,'#ff69b4');
    queueDialogue('GORJAN','I see you! Almost there!',130,'#00ff88');
  }
  updateDialogue();drawDialogue();
  if(lives<=0)gameState='gameover';
}

// Helper: fire Emir's gun toward player
function fireEmir(em,pl,phase,d){
  const dx=pl.x-em.x, dy=pl.y-em.y;
  const dist=Math.sqrt(dx*dx+dy*dy)||1;
  const spd=phase===1?3.8:phase===2?4.8:5.5;
  const count=phase===3?3:phase===2?2:1;
  for(let i=0;i<count;i++){
    const spread=(i-(count-1)/2)*0.35;
    d.bullets.push({x:em.x,y:em.y+10,vx:dx/dist*spd+spread,vy:dy/dist*spd*0.65+(i===0?0:(Math.random()-.5)*0.5),alive:true});
  }
  screenFlash=4;screenFlashColor='#ff8800';
}
