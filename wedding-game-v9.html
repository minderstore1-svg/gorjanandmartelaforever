    rescued:false,victoryTimer:0,
    dashCool:0,dashActive:false,dashTimer:0,dashDir:0,
    wave:1,  // 1=guards+mihaela, boss escalates
    attTimer:0,attIdx:0,
    guardDefeated:0,
  };
  setNarrator('');
  levelData.startFrame=frameCount;
  showHint('STOMP ENEMIES TO DAMAGE — ARROW KEYS + UP=JUMP — LEFT+LEFT=DASH','P2 / Martela only');
}

function runBonusLevel(){
  const d=levelData;
  const pl=d.p2;
  const mh=d.mihaela;
  const phase=mh.hp>3?1:mh.hp>1?2:3;
  mh.phase=phase;

  // Background — deep purple
  const gr=ctx.createLinearGradient(0,0,0,H);
  gr.addColorStop(0,'#2d003d');gr.addColorStop(1,'#1a001a');
  ctx.fillStyle=gr;ctx.fillRect(0,0,W,H);
  for(let i=0;i<40;i++){
    const sx=(i*137+frameCount)%W,sy=(i*97+frameCount*.3)%H;
    ctx.fillStyle=`rgba(255,100,200,${0.25+Math.sin(i+frameCount*.05)*.15})`;
    ctx.fillRect(sx,sy,2,2);
  }
  // Phase 3 rage effect
  if(phase===3){ctx.fillStyle=`rgba(255,0,100,${0.04+Math.sin(frameCount*.3)*.03})`;ctx.fillRect(0,0,W,H);}
  ctx.fillStyle='#3d0030';ctx.fillRect(0,H-60,W,60);
  ctx.fillStyle='#ff1493';ctx.fillRect(0,H-60,W,3);
  d.platforms.forEach(p=>{
    ctx.fillStyle='#2d0030';ctx.fillRect(p.x,p.y,p.w,p.h);
    ctx.fillStyle='#ff1493';ctx.fillRect(p.x,p.y,p.w,2);
  });

  // Gorjan in cage
  if(!d.rescued){
    ctx.fillStyle='#1a1a2a';ctx.fillRect(W-85,100,70,90);
    ctx.strokeStyle='#ff1493';ctx.lineWidth=2;ctx.strokeRect(W-85,100,70,90);
    for(let bi=0;bi<4;bi++){ctx.strokeStyle='#888';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(W-83+bi*17,102);ctx.lineTo(W-83+bi*17,188);ctx.stroke();}
    drawGorjan(d.gorjanCapturedX,d.gorjanCapturedY,1,0);
  }

  // ── GUARD ENEMIES (Dragan + Emir) ───────────────────────────────
  d.guards.forEach(en=>{
    if(!en.alive)return;
    en.x+=en.vx;
    if(en.x<30||en.x>W-80)en.vx*=-1;
    if(en.type==='dragan') drawDragan(en.x,en.y,frameCount);
    else drawEmir(en.x,en.y,frameCount);
    for(let i=0;i<en.hp;i++){ctx.fillStyle='#ff6600';ctx.fillRect(en.x-15+i*11,en.y-48,9,5);}
    // stomp
    if(Math.abs(pl.x-en.x)<28&&Math.abs(pl.y-en.y)<34&&pl.vy<-2){
      en.hp--;pl.vy=-8;spawnParticle(en.x,en.y,'#ff1493',12,6);screenFlash=7;screenFlashColor='#ff1493';
      if(en.hp<=0){
        en.alive=false;d.guardDefeated++;spawnParticle(en.x,en.y,'#ffd700',18,8);score+=300;
        if(en.type==='dragan') queueDialogue('DRAGAN','Tell my son Papa fought a woman with purple hair. He will understand.',180,'#ffaa00');
        else queueDialogue('EMIR','The hat... at least I still have the hat...',160,'#ff4444');
      }
    } else if(Math.abs(pl.x-en.x)<28&&Math.abs(pl.y-en.y)<34){
      lives=Math.max(0,lives-1);screenFlash=12;screenFlashColor='#ff0000';pl.x=40;pl.vy=-5;
    }
  });

  // ── MIHAELA BOSS AI ──────────────────────────────────────────────
  if(mh.hp>0){
    mh.stateTimer++;
    mh.jumpCool=Math.max(0,mh.jumpCool-1);
    mh.shootTimer++;

    const dx=pl.x-mh.x, dy=pl.y-mh.y;
    const dist=Math.sqrt(dx*dx+dy*dy)||1;
    const playerAbove=pl.y<mh.y-20&&Math.abs(dx)<90;
    const spd=1.4+phase*0.6;

    // State machine
    if(mh.state==='patrol'){
      // Dodge if Martela above
      if(playerAbove&&mh.grounded){
        mh.vx=dx>0?-5.5:5.5;
        mh.state='dodge';mh.stateTimer=0;
        if(phase>=2){screenFlash=3;screenFlashColor='#ff69b4';}
      } else {
        // Phase 1: keep distance. Phase 2+: close in aggressively
        if(phase===1){
          if(dist>180) mh.vx+=(dx>0?.25:-.25);
          else if(dist<100) mh.vx+=(dx>0?-.25:.25);
          else mh.vx*=0.9;
        } else {
          mh.vx+=(dx>0?.35:-.35);
        }
        // Shoot spreadsheets
        const sRate=phase===1?100:phase===2?65:38;
        if(mh.shootTimer>sRate){
          fireSpreadsheet(mh,pl,phase,d);
          mh.shootTimer=0;
          if(phase===3){mh.state='burst';mh.stateTimer=0;}
        }
        // Jump occasionally / when chasing
        if(mh.grounded&&mh.jumpCool===0&&(Math.random()<.01||playerAbove)){
          mh.vy=-(10+phase*.8);mh.grounded=false;mh.jumpCool=80;
        }
      }
    } else if(mh.state==='dodge'){
      mh.vx*=.85;
      if(mh.stateTimer>28){mh.state='patrol';mh.stateTimer=0;}
    } else if(mh.state==='burst'){
      // Phase 3: rapid spreadsheet burst
      if(mh.stateTimer%10===0&&mh.stateTimer<50) fireSpreadsheet(mh,pl,phase,d);
      if(mh.stateTimer>65){mh.state='patrol';mh.stateTimer=0;}
    }

    // Phase 2+: slam jump at Martela
    if(phase>=2&&mh.grounded&&Math.random()<.004&&dist<250){
      mh.vy=-(12+phase);mh.vx=dx>0?4:-4;mh.grounded=false;mh.jumpCool=100;
      if(phase===3) queueDialogue('MIHAELA','YOU CANNOT DODGE THE SPREADSHEET!!',120,'#ff69b4');
    }

    // Physics
    mh.vx=Math.max(-7,Math.min(7,mh.vx));
    mh.vx*=.84;
    mh.vy+=.5;
    mh.x+=mh.vx;mh.y+=mh.vy;
    mh.x=Math.max(10,Math.min(W-10,mh.x));
    mh.facing=mh.vx<-.1?-1:mh.vx>.1?1:mh.facing;
    mh.grounded=false;
    d.platforms.forEach(p=>{
      if(mh.x>p.x&&mh.x<p.x+p.w&&mh.y+18>p.y&&mh.y+18<p.y+p.h+Math.abs(mh.vy)+2&&mh.vy>=0){
        mh.y=p.y-18;mh.vy=0;mh.grounded=true;
      }
    });
    if(mh.y>H+40){mh.x=300;mh.y=200;mh.vy=0;}

    drawMihaela(mh.x,mh.y,frameCount);

    // HP bar
    for(let i=0;i<mh.hp;i++){
      ctx.fillStyle=phase===3?'#ff1493':phase===2?'#ff69b4':'#ff88cc';
      ctx.fillRect(mh.x-26+i*12,mh.y-54,10,7);
      ctx.strokeStyle='#000';ctx.lineWidth=1;ctx.strokeRect(mh.x-26+i*12,mh.y-54,10,7);
    }
    if(phase>1) drawText(phase===3?'FURIOUS!':'ANGRY!',mh.x-20,mh.y-62,5,phase===3?'#ff1493':'#ff88cc');

    // Stomp Mihaela
    if(Math.abs(pl.x-mh.x)<30&&Math.abs(pl.y-mh.y)<36&&pl.vy<-2){
      mh.hp--;pl.vy=-10;
      spawnParticle(mh.x,mh.y,'#ff1493',14,7);screenFlash=12;screenFlashColor='#fff';
      if(mh.hp===3) queueDialogue('MIHAELA','The spreadsheet did NOT predict this.',140,'#ff69b4');
      if(mh.hp===1) queueDialogue('MIHAELA','Column H was supposed to prevent this!!',140,'#ff1493');
      if(mh.hp<=0){
        spawnParticle(mh.x,mh.y,'#ffd700',30,10);spawnParticle(mh.x,mh.y,'#ff1493',20,7);
        score+=1200;
        queueDialogue('MIHAELA','Fine. You are better at this than me. The spreadsheet predicted this outcome.',240,'#ff4444');
      }
    } else if(Math.abs(pl.x-mh.x)<30&&Math.abs(pl.y-mh.y)<36&&mh.hp>0){
      lives=Math.max(0,lives-1);screenFlash=15;screenFlashColor='#ff0000';pl.x=40;pl.vy=-5;
    }
  }

  // ── PROJECTILES (spreadsheet pages) ─────────────────────────────
  d.projectiles=d.projectiles.filter(b=>b.alive&&b.y<H+20&&b.x>-20&&b.x<W+20);
  d.projectiles.forEach(b=>{
    b.x+=b.vx;b.y+=b.vy;b.rot=(b.rot||0)+.12;
    ctx.save();ctx.translate(b.x,b.y);ctx.rotate(b.rot);
    ctx.fillStyle='#eef';ctx.fillRect(-8,-6,16,12);
    ctx.strokeStyle='#aac';ctx.lineWidth=1;ctx.strokeRect(-8,-6,16,12);
    // lines on the page
    ctx.strokeStyle='rgba(0,0,180,0.4)';ctx.lineWidth=0.8;
    [-2,1,4].forEach(ly=>{ctx.beginPath();ctx.moveTo(-6,ly);ctx.lineTo(6,ly);ctx.stroke();});
    ctx.restore();
    if(Math.abs(b.x-pl.x)<14&&Math.abs(b.y-pl.y)<16){
      b.alive=false;lives=Math.max(0,lives-1);screenFlash=13;screenFlashColor='#ff4444';
      if(lives<=0)gameState='gameover';
    }
  });

  // ── MARTELA DASH (double-tap arrow) ──────────────────────────────
  if(!d.dashCool) d.dashCool=0;
  d.dashCool=Math.max(0,d.dashCool-1);
  if(!d.lastLeft) d.lastLeft=0;
  if(!d.lastRight) d.lastRight=0;
  if(keys['ArrowLeft']){if(frameCount-d.lastLeft<12&&d.dashCool===0){pl.vx=-14;d.dashCool=50;spawnParticle(pl.x,pl.y,'#ff1493',6,4);}d.lastLeft=frameCount;}
  if(keys['ArrowRight']){if(frameCount-d.lastRight<12&&d.dashCool===0){pl.vx=14;d.dashCool=50;spawnParticle(pl.x,pl.y,'#ff1493',6,4);}d.lastRight=frameCount;}

  // ── PLAYER PHYSICS ───────────────────────────────────────────────
  if(keys['ArrowLeft']){pl.vx=Math.min(pl.vx,-pl.speed);pl.facing=-1;pl.frame++;}
  else if(keys['ArrowRight']){pl.vx=Math.max(pl.vx,pl.speed);pl.facing=1;pl.frame++;}
  else pl.vx*=0.72;
  if(keys['ArrowUp']&&pl.grounded){pl.vy=-11;pl.grounded=false;}  // jumps higher than Gorjan
  pl.vy+=.42;pl.x+=pl.vx;pl.y+=pl.vy;
  pl.x=Math.max(10,Math.min(W-10,pl.x));
  pl.grounded=false;
  d.platforms.forEach(p=>{if(pl.x>p.x&&pl.x<p.x+p.w&&pl.y+18>p.y&&pl.y+18<p.y+p.h+Math.abs(pl.vy)+2&&pl.vy>=0){pl.y=p.y-18;pl.vy=0;pl.grounded=true;}});
  if(pl.y>H+50){pl.x=40;pl.y=200;pl.vy=0;lives=Math.max(0,lives-1);screenFlash=15;screenFlashColor='#ff0000';if(lives<=0)gameState='gameover';}

  drawMartela(pl.x,pl.y,pl.facing,pl.frame);

  // ── ATTITUDE LINES ───────────────────────────────────────────────
  d.attTimer++;
  const attLines=[
    {s:'MARTELA',t:'Purple hair. Bad attitude. Your problem now.',c:'#ff1493'},
    {s:'MARTELA',t:'I survived Tokyo ramen queues. You are nothing.',c:'#ff1493'},
    {s:'MARTELA',t:'I planned a wedding in six months. I can handle YOU.',c:'#ff1493'},
  ];
  if(d.attTimer%380===0&&d.attIdx<attLines.length){
    const al=attLines[d.attIdx++];
    queueDialogue(al.s,al.t,160,al.c);
  }

  // ── WIN CONDITION ────────────────────────────────────────────────
  const allDead=mh.hp<=0&&d.guards.every(g=>!g.alive);
  if(allDead&&!d.rescued){
    d.rescued=true;d.victoryTimer=0;
    spawnParticle(W/2,H/2,'#ff1493',30,9);spawnParticle(W/2,H/2,'#ffd700',20,6);
    score+=1500;
  }
  if(d.rescued){
    d.victoryTimer++;
    drawGorjan(W/2+30,H-100,-1,frameCount);
    ctx.fillStyle='rgba(0,0,0,0.9)';ctx.fillRect(40,70,W-80,100);
    ctx.strokeStyle='#ff1493';ctx.lineWidth=2;ctx.strokeRect(40,70,W-80,100);
    if(d.victoryTimer===1) queueDialogue('GORJAN','You came for me!',130,'#00ff88');
    if(d.victoryTimer===55) queueDialogue('MARTELA','Obviously. Now let us go get married.',150,'#ff1493');
    if(d.victoryTimer===115) queueDialogue('GORJAN','31 May 2026. Nothing can stop us now.',180,'#ffd700');
    drawTextC('MARTELA SAVES GORJAN!',110,10,'#ff1493');
    drawTextC('FASTER. STRONGER. SASSIER.',132,6,'#ffd700');
    drawTextC('TRUE PARTNERSHIP ♥',152,6,'#fff');
    if(d.victoryTimer>180&&!d.endingStarted){d.endingStarted=true;setTimeout(startEnding,600);}
  }

  // ── HUD ──────────────────────────────────────────────────────────
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,28);
  drawText("MARTELA'S REVENGE!",10,20,7,'#ff1493');
  drawText('LIVES: '+'♥'.repeat(lives),W-130,20,7,'#ff4444');
  if(d.dashCool===0&&mh.hp>0) drawText('← ← or → → = DASH',W/2-80,20,5,'#ff88cc');
  updateDialogue();drawDialogue();
  if(lives<=0)gameState='gameover';
}

// Helper: Mihaela fires a spreadsheet projectile
function fireSpreadsheet(mh,pl,phase,d){
  const dx=pl.x-mh.x,dy=pl.y-mh.y;
  const dist=Math.sqrt(dx*dx+dy*dy)||1;
  const spd=phase===1?3.2:phase===2?4.2:5;
  const count=phase===3?3:phase===2?2:1;
  for(let i=0;i<count;i++){
    const spread=(i-(count-1)/2)*0.4;
    d.projectiles.push({x:mh.x,y:mh.y,vx:dx/dist*spd+spread,vy:dy/dist*spd*.7+(i===0?0:(Math.random()-.5)*.6),alive:true,rot:0});
  }
}

// == CUTSCENE =====================================================
function drawCutscene(){
  const slide = cutsceneIndex < cutsceneText.length ? cutsceneText[cutsceneIndex] : null;
  const isSponge = slide && slide.spongebob;

  if(isSponge){
    ctx.save();
    // ── SpongeBob time card ──────────────────────────────────────────
    // 1. Deep red background
    ctx.fillStyle='#c0100a'; ctx.fillRect(0,0,W,H);

    // 2. Aztec tile pattern (4×4 repeating geometric motif)
    const T=40; // tile size
    ctx.strokeStyle='rgba(180,20,10,0.7)'; ctx.lineWidth=1.2;
    for(let tx=0;tx<W;tx+=T){
      for(let ty=0;ty<H;ty+=T){
        const cx2=tx+T/2, cy2=ty+T/2, r=T*0.38;
        // outer square rotated 45°
        ctx.beginPath();
        ctx.moveTo(cx2,ty+3); ctx.lineTo(tx+T-3,cy2);
        ctx.lineTo(cx2,ty+T-3); ctx.lineTo(tx+3,cy2);
        ctx.closePath(); ctx.stroke();
        // inner circle
        ctx.beginPath(); ctx.arc(cx2,cy2,r*0.42,0,Math.PI*2); ctx.stroke();
        // 4 notches on diamond edges
        [[0,-r],[r,0],[0,r],[-r,0]].forEach(([dx,dy])=>{
          ctx.beginPath(); ctx.arc(cx2+dx,cy2+dy,2.5,0,Math.PI*2); ctx.stroke();
        });
      }
    }

    // 3. Corner flowers — outline style, 6 petals, different colours per corner
    function drawFlower(fx,fy,r,color,rot=0){
      ctx.strokeStyle=color; ctx.lineWidth=3; ctx.fillStyle='rgba(0,0,0,0)';
      for(let p=0;p<6;p++){
        const a=rot+(p/6)*Math.PI*2;
        const px=fx+Math.cos(a)*r*0.72, py=fy+Math.sin(a)*r*0.72;
        ctx.beginPath(); ctx.arc(px,py,r*0.45,0,Math.PI*2); ctx.stroke();
      }
      // center circle
      ctx.beginPath(); ctx.arc(fx,fy,r*0.22,0,Math.PI*2); ctx.stroke();
    }
    const flowers=[
      // [x, y, radius, colour, rot, scale]
      [55,  55,  38, '#f5a623', 0.2],
      [W-55,55,  34, '#4a90d9', 0.5],
      [30,  H-50,32, '#e91e8c', 0.1],
      [W-45,H-45,36, '#e67e22', 0.8],
      [160, H-45,28, '#c0392b', 0.3],
      [W-170,55, 30, '#6ab04c', 0.6],
      [W/2-120,42,24, '#e84393',0.0],
    ];
    flowers.forEach(([fx,fy,r,col,rot])=>drawFlower(fx,fy,r,col,rot));

    // 4. Chunky slab text — pink fill, dark red thick outline
    const txt = Array.isArray(slide.lines) ? slide.lines : [slide.lines];
    const lineH = 68;
    const totalH = txt.length * lineH;
    const startY = H/2 - totalH/2 + lineH*0.7;
    ctx.save();
    ctx.textAlign='center';
    txt.forEach((line, i)=>{
      const y = startY + i*lineH;
      // thick dark outline
      ctx.font="62px 'SomeTimeLater', 'Arial Black', sans-serif";
      ctx.lineWidth=10; ctx.strokeStyle='#6b0000';
      ctx.lineJoin='round'; ctx.strokeText(line, W/2, y);
      // pink fill
      ctx.fillStyle='#f9c8c8';
      ctx.fillText(line, W/2, y);
    });
    ctx.restore();

    // 5. Continue prompt
    if(Math.floor(frameCount/30)%2===0){
      const isFirst = cutsceneIndex===0;
      const msg = (!isFirst ? '◄ BACK   ' : '') + 'ENTER — NEXT ►';
      ctx.font="7px 'Press Start 2P'"; ctx.fillStyle='rgba(255,200,200,0.6)';
      ctx.textAlign='center'; ctx.fillText(msg, W/2, H-18);
    }
    ctx.restore();
    return;
  }

  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  tStars.forEach(s=>{ctx.fillStyle='rgba(255,255,255,0.35)';ctx.fillRect(s.x,s.y,s.s,s.s);});
  ctx.fillStyle='#111';ctx.fillRect(0,0,W,60);ctx.fillRect(0,H-60,W,60);
  ctx.strokeStyle='#ffd700';ctx.lineWidth=1;ctx.strokeRect(40,75,W-80,H-150);
  if(slide){
    const lines = Array.isArray(slide) ? slide : (slide.lines||[slide]);
    lines.forEach((l,i)=>drawTextC(l,H/2-(lines.length-1)*18+i*36,9,i===0?'#ffd700':'#fff'));
  }
  if(Math.floor(frameCount/30)%2===0){
    const isFirst = cutsceneIndex===0;
    const msg = (!isFirst ? '◄ BACK   ' : '') + 'ENTER — NEXT ►';
    drawTextC(msg,H-35,6,'#888');
  }
}

// == HUD ==========================================================
function updateHUD(){
  const hud=document.getElementById('hud');
  const inGame=['playing','levelclear','gameover','pause'].includes(gameState);
  if(hud) hud.style.display=inGame?'flex':'none';
  const hl=document.getElementById('hud-left');
  const hc=document.getElementById('hud-center');
  const hr=document.getElementById('hud-right');
  if(hl) hl.textContent='♥'.repeat(Math.max(0,lives));

}

// == MAIN LOOP ====================================================
function gameLoop(){
  requestAnimationFrame(gameLoop);
  try{
  if(paused){
    ctx.fillStyle='rgba(0,0,0,0.82)';ctx.fillRect(0,0,W,H);
    drawTextC('- PAUSED -',H/2-70,12,'#ffd700');
    // Option 0: Resume
    var r0sel=pauseOption===0;
    ctx.fillStyle=r0sel?'rgba(0,255,136,0.12)':'rgba(255,255,255,0.03)';
    ctx.fillRect(W/2-140,H/2-30,280,44);
    ctx.strokeStyle=r0sel?'#00ff88':'#333';ctx.lineWidth=r0sel?2.5:1;
    ctx.strokeRect(W/2-140,H/2-30,280,44);
    if(r0sel){ctx.fillStyle='#00ff88';ctx.font="14px 'Press Start 2P'";ctx.fillText('>',W/2-128,H/2-2);}
    drawTextC('RESUME GAME',H/2-2,10,r0sel?'#00ff88':'#555');
    // Option 1: Home
    var r1sel=pauseOption===1;
    ctx.fillStyle=r1sel?'rgba(255,77,109,0.12)':'rgba(255,255,255,0.03)';
    ctx.fillRect(W/2-140,H/2+28,280,44);
    ctx.strokeStyle=r1sel?'#ff4d6d':'#333';ctx.lineWidth=r1sel?2.5:1;
    ctx.strokeRect(W/2-140,H/2+28,280,44);
    if(r1sel){ctx.fillStyle='#ff4d6d';ctx.font="14px 'Press Start 2P'";ctx.fillText('>',W/2-128,H/2+56);}
    drawTextC('BACK TO TITLE',H/2+56,10,r1sel?'#ff4d6d':'#555');
    // hint
    var blink=Math.floor(frameCount/25)%2===0;
    if(blink) drawTextC('UP/DOWN to choose   ENTER to confirm',H/2+90,6,'#888');
    return;
  }
  frameCount++;
  ctx.clearRect(0,0,W,H);
  switch(gameState){
    case 'title': runTitle(); break;
    case 'cutscene': drawCutscene(); break;
    case 'intro': drawIntro(); break;
    case 'ending': drawEnding(); break;
    case 'select': gameState='title'; break;
    case 'playing':
      if(currentLevel<LEVELS.length) LEVELS[currentLevel]?.fn();
      updateParticles();drawParticles();drawScreenFlash();drawGodOverlay();
      break;
    case 'levelclear':
      if(currentLevel<LEVELS.length) LEVELS[currentLevel]?.fn();
      updateParticles();drawParticles();drawLevelClear();
      break;
    case 'gameover': drawGameOver(); break;
    case 'credits': runCredits(); break;
  }
  updateHUD();
  } catch(e) { console.error('GameLoop error:', e.message, e.stack); }
}
function drawScreenFlash(){if(screenFlash>0){ctx.fillStyle=screenFlashColor;ctx.globalAlpha=screenFlash/30*.4;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;screenFlash--;}}
// Auto-scale game to fill browser window without overflow
(function(){
  function scaleGame(){
    var container = document.getElementById('game-container');
    if(!container) return;
    // Total height needed: canvas(480) + border(8) + hint bars below(~50)
    var totalH = 538;
    var totalW = 648; // 640 + 8px border
    var scaleX = (window.innerWidth  - 16) / totalW;
    var scaleY = (window.innerHeight - 40) / totalH;
    var scale  = Math.min(scaleX, scaleY, 1.8); // cap at 1.8x to avoid blurriness
    container.style.transform = 'scale('+scale+')';
    container.style.marginBottom = (scale * 50) + 'px'; // space for hint bars
  }
  window.addEventListener('resize', scaleGame);
  // Small delay to let browser settle after load
  setTimeout(scaleGame, 100);
  scaleGame();
})();

// Mobile controller — optimised WebSocket client
(function(){
  var sock, reconnectTimer;
  var ctrlBar = document.getElementById('ctrl-bar');
  var ctrlUrl = document.getElementById('ctrl-url');
  // Keys that need full event dispatch (trigger state changes, not just movement)
  var triggerKeys = {' ':1,'Enter':1,'Escape':1,'f':1,'F':1,'[':1,']':1};

  function connect(){
    try{ sock = new WebSocket('ws://localhost:3000'); }
    catch(e){ return; }

    sock.onopen = function(){
      sock.send('game_register');
    };

    sock.onmessage = function(e){
      var raw = e.data;

      // Compact protocol: "d:ArrowLeft" or "u:ArrowLeft"
      if(raw === 'GODMODE'){
        godMode = !godMode;
        lives = godMode ? 99 : 3;
        screenFlash = 40; screenFlashColor = godMode ? '#ffd700' : '#ff4444';
        var gb = document.getElementById('god-bar');
        if(gb) gb.style.display = godMode ? 'block' : 'none';
        return;
      }
      if(raw[1]===':'){
        var down = raw[0]==='d';
        var key  = raw.slice(2);
        // Direct keys[] update for held-key polling
        keys[key] = down;
        // Dispatch keydown only on fresh press (not heartbeat repeats)
        // Heartbeat sends 'd:key' but keys[key] is already true — skip re-dispatch
        if(down && !window.__heldKeys) window.__heldKeys = {};
        if(down && !window.__heldKeys[key]){
          window.__heldKeys[key] = true;
          document.dispatchEvent(new KeyboardEvent('keydown',{key:key,code:key,bubbles:true,cancelable:true}));
        }
        if(!down && window.__heldKeys) window.__heldKeys[key] = false;
        return;
      }

      // JSON messages (server info, player status)
      var msg;
      try{ msg=JSON.parse(raw); }catch(x){ return; }

      if(msg.type==='server_info'){
        if(ctrlBar) ctrlBar.style.display='flex';
        if(ctrlUrl) ctrlUrl.textContent='📱 '+msg.url+'/controller';
      }
      if(msg.type==='player_connected'){
        var dot=document.getElementById('ctrl-status-'+msg.player);
        if(dot){ dot.style.background='#00ff88'; dot.style.boxShadow='0 0 6px #00ff88'; }
      }
      if(msg.type==='player_disconnected'){
        var dot=document.getElementById('ctrl-status-'+msg.player);
        if(dot){ dot.style.background='#333'; dot.style.boxShadow='none'; }
      }
    };

    sock.onclose = function(){
      // Clear all held keys on disconnect to prevent stuck keys
      Object.keys(keys).forEach(function(k){ keys[k]=false; });
      if(ctrlBar) ctrlBar.style.display='none';
      reconnectTimer = setTimeout(connect, 3000);
    };
    sock.onerror = function(){};
  }

  connect();
})();
