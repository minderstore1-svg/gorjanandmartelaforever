<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<meta name="mobile-web-app-capable" content="yes">
<title>🎮 Wedding Game Controller</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;touch-action:none;}
:root{--sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);}
html,body{width:100%;height:100%;min-height:100dvh;overflow:hidden;background:#000;font-family:'Press Start 2P',monospace;touch-action:none;overscroll-behavior:none;}

/* ── ROTATE OVERLAY ── */
#rotate-overlay{display:none;position:fixed;inset:0;z-index:999;background:#000;flex-direction:column;align-items:center;justify-content:center;gap:24px;text-align:center;padding:32px;}
@keyframes spin{0%{transform:rotate(0deg)}40%,60%{transform:rotate(90deg)}100%{transform:rotate(90deg)}}

/* ── SCREENS ── */
.screen{display:none;position:fixed;inset:0;width:100vw;height:100vh;height:100dvh;}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center;}
#screen-ctrl.active{display:grid !important;}

/* ── CONNECT SCREEN ── */
#screen-connect{background:linear-gradient(135deg,#000010,#1a0030);}
#screen-connect h1{color:#ffd700;font-size:10px;text-align:center;line-height:2;margin-bottom:24px;}
#screen-connect p{color:#888;font-size:6px;text-align:center;margin-bottom:32px;line-height:2;}
.player-btns{display:flex;gap:20px;}
.player-btn{width:130px;height:130px;border-radius:16px;border:3px solid;font-family:inherit;font-size:8px;font-weight:bold;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;transition:transform .1s;line-height:1.6;}
.player-btn:active{transform:scale(.94);}
.player-btn.p1{background:#001a00;border-color:#00ff88;color:#00ff88;}
.player-btn.p2{background:#1a0010;border-color:#ff1493;color:#ff1493;}
.player-btn .emoji{font-size:32px;}
.connecting-msg{color:#aaa;font-size:6px;margin-top:20px;display:none;}

/* ── STATUS BAR ── */
#status-bar{position:fixed;top:0;left:0;right:0;height:44px;z-index:99;display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-size:7px;}
#status-bar.p1{background:#001a00;border-bottom:2px solid #00ff88;}
#status-bar.p2{background:#1a0010;border-bottom:2px solid #ff1493;}
#status-name{font-size:9px;}
#status-dot{width:12px;height:12px;border-radius:50%;background:#555;}
#status-dot.on{background:#00ff88;box-shadow:0 0 8px #00ff88;}

/* ── CONTROLLER SCREEN — fullscreen joystick + action only ── */
#screen-ctrl{
  padding-top:calc(44px + var(--sat));
  padding-bottom:max(8px, var(--sab));
  padding-left:max(8px, env(safe-area-inset-left,0px));
  padding-right:max(8px, env(safe-area-inset-right,0px));
  grid-template-columns: 1fr 1fr;
  align-items:center;
  justify-items:center;
  height:100vh;
  height:100dvh;
  gap:0;
}
#screen-ctrl.p1{background:linear-gradient(135deg,#000d00,#001a00);}
#screen-ctrl.p2{background:linear-gradient(135deg,#0d0010,#1a0018);}

/* ── JOYSTICK — column 1, centred ── */
#joystick-wrap{
  justify-self:center;
  align-self:center;
  position:relative;
  width:min(42vw, calc(100dvh - 76px));
  height:min(42vw, calc(100dvh - 76px));
  max-width:255px;
  max-height:255px;
  min-width:170px;
  min-height:170px;
}
#joystick-base{
  position:absolute;inset:0;
  border-radius:50%;
  background:rgba(255,255,255,0.06);
  border:3px solid rgba(255,255,255,0.14);
}
/* Cardinal direction indicators */
#joystick-base::before,#joystick-base::after{content:'';position:absolute;background:rgba(255,255,255,0.1);border-radius:3px;}
#joystick-base::before{left:50%;top:8%;transform:translateX(-50%);width:12%;height:18%;}
#joystick-base::after{left:50%;bottom:8%;transform:translateX(-50%);width:12%;height:18%;}
.joy-lr{position:absolute;top:50%;background:rgba(255,255,255,0.1);border-radius:3px;width:18%;height:12%;transform:translateY(-50%);}
.joy-lr.left{left:8%;}
.joy-lr.right{right:8%;}
/* Inner ring */
#joystick-ring{
  position:absolute;
  inset:15%;
  border-radius:50%;
  border:2px solid rgba(255,255,255,0.08);
}
/* The knob / thumb */
#joystick-knob{
  position:absolute;
  width:38%;height:38%;
  border-radius:50%;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle at 35% 35%, rgba(255,255,255,0.35), rgba(255,255,255,0.1));
  border:3px solid rgba(255,255,255,0.4);
  box-shadow:0 4px 16px rgba(0,0,0,0.5);
  transition:transform 0.06s ease-out;
  pointer-events:none;
}
#joystick-knob.active{
  background:radial-gradient(circle at 35% 35%, rgba(255,220,0,0.6), rgba(255,180,0,0.25));
  border-color:rgba(255,220,0,0.7);
  box-shadow:0 4px 20px rgba(255,200,0,0.4);
}
/* Arrow labels on the base */
.joy-arrow{position:absolute;font-size:14px;color:rgba(255,255,255,0.2);pointer-events:none;line-height:1;}
.joy-arrow.up{top:6%;left:50%;transform:translateX(-50%);}
.joy-arrow.dn{bottom:6%;left:50%;transform:translateX(-50%);}
.joy-arrow.lt{left:6%;top:50%;transform:translateY(-50%);}
.joy-arrow.rt{right:6%;top:50%;transform:translateY(-50%);}

/* ── ACTION COLUMN (right side) — keep action in the same play position ── */
#action-col{
  justify-self:center;
  align-self:center;
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
}
#btn-action{
  width:min(22vw, 136px, calc(100dvh - 92px));
  height:min(22vw, 136px, calc(100dvh - 92px));
  border-radius:50%;
  border:4px solid;
  font-family:inherit;font-size:10px;font-weight:bold;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  touch-action:none;
  transition:transform .05s;
}
#btn-action:active,#btn-action.pressed{transform:scale(.88);}
#btn-action.p1-style{background:#1a1000;border-color:#ffd700;color:#ffd700;}
#btn-action.p2-style{background:#1a0010;border-color:#ff1493;color:#ff1493;}

/* ── UTILITY PANEL — hidden by default, available when needed ── */
#util-toggle{
  position:fixed;
  top:max(6px, var(--sat));
  right:max(10px, env(safe-area-inset-right,0px));
  z-index:130;
  width:54px;
  height:30px;
  border-radius:8px;
  border:1.5px solid rgba(255,255,255,0.22);
  background:rgba(0,0,0,0.35);
  color:#aaa;
  font-family:inherit;
  font-size:7px;
  display:none;
  align-items:center;
  justify-content:center;
  touch-action:none;
}
#util-toggle.visible{display:flex;}
#util-toggle.pressed{background:rgba(255,255,255,0.18);color:#fff;}
#util-col{
  display:none;
  position:fixed;
  top:calc(44px + var(--sat));
  right:max(8px, env(safe-area-inset-right,0px));
  bottom:max(8px, var(--sab));
  z-index:120;
  width:78px;
  flex-direction:column;
  align-items:stretch;
  justify-content:center;
  gap:6px;
  padding:6px;
  border-radius:12px;
  background:rgba(0,0,0,0.58);
  border:1.5px solid rgba(255,255,255,0.12);
  backdrop-filter:blur(4px);
}
#util-col.visible{display:flex;}
.util-btn{
  height:30px;
  border-radius:6px;
  border:1.5px solid rgba(255,255,255,0.18);
  background:rgba(255,255,255,0.05);
  font-family:inherit;font-size:5px;color:#777;
  display:flex;align-items:center;justify-content:center;gap:2px;
  touch-action:none;white-space:nowrap;
  transition:background .08s;
}
.util-btn.pressed{background:rgba(255,255,255,0.22);color:#fff;}
.util-btn.esc-btn{border-color:rgba(255,80,80,0.5);color:#ff8888;}
.util-btn.esc-btn.pressed{background:rgba(255,0,0,0.18);}
.util-btn.mute-btn{border-color:rgba(255,200,0,0.4);color:#ffcc44;}
.util-btn.mute-btn.pressed{background:rgba(255,200,0,0.15);}
.util-btn.sfx-btn{border-color:rgba(100,200,255,0.4);color:#88ccff;}
.util-btn.sfx-btn.pressed{background:rgba(100,200,255,0.15);}
.util-btn.fs-btn{border-color:rgba(180,140,255,0.45);color:#c8a8ff;}
.util-btn.fs-btn.pressed{background:rgba(180,140,255,0.16);}

@media (max-height:420px){
  #status-bar{height:36px;font-size:6px;padding:0 12px;}
  #status-name{font-size:8px;}
  #screen-ctrl{padding-top:calc(36px + var(--sat));grid-template-columns:1fr 1fr;}
  #joystick-wrap{width:min(40vw, calc(100dvh - 62px));height:min(40vw, calc(100dvh - 62px));min-width:145px;min-height:145px;}
  #btn-action{width:min(18vw, 112px, calc(100dvh - 74px));height:min(18vw, 112px, calc(100dvh - 74px));font-size:8px;}
}
@media (max-width:720px){
  #screen-ctrl{grid-template-columns:1fr 1fr;}
  #joystick-wrap{justify-self:center;}
}

</style>
</head>
<body>

<!-- Rotate overlay -->
<div id="rotate-overlay">
  <div style="font-size:72px;animation:spin 2s ease-in-out infinite;">📱</div>
  <div style="font-size:11px;color:#ffd700;line-height:2;">ROTATE YOUR<br>PHONE</div>
  <div style="font-size:8px;color:#888;line-height:2;">LANDSCAPE MODE<br>REQUIRED TO PLAY</div>
</div>

<!-- CONNECT SCREEN -->
<div id="screen-connect" class="screen active">
  <h1>GORJAN &amp; MARTELA<br>FOREVER ♥</h1>
  <p>Choose your player</p>
  <div class="player-btns">
    <button class="player-btn p1" onclick="choosePlayer('p1')">
      <span class="emoji">🧔</span>
      <span>GORJAN<br>Player 1</span>
    </button>
    <button class="player-btn p2" onclick="choosePlayer('p2')">
      <span class="emoji">💜</span>
      <span>MARTELA<br>Player 2</span>
    </button>
  </div>
  <p style="font-size:5px;color:#444;margin-top:20px;">TAP A PLAYER TO GO FULLSCREEN</p>
  <p class="connecting-msg" id="connecting-msg">Connecting...</p>
</div>

<!-- STATUS BAR -->
<div id="status-bar" style="display:none">
  <span id="status-name">P1 — GORJAN</span>
  <span id="status-dot"></span>
</div>

<!-- CONTROLLER SCREEN -->
<div id="screen-ctrl" class="screen">

  <!-- LEFT: Joystick -->
  <div id="joystick-wrap">
    <div id="joystick-base">
      <div class="joy-lr left"></div>
      <div class="joy-lr right"></div>
      <span class="joy-arrow up">▲</span>
      <span class="joy-arrow dn">▼</span>
      <span class="joy-arrow lt">◀</span>
      <span class="joy-arrow rt">▶</span>
    </div>
    <div id="joystick-ring"></div>
    <div id="joystick-knob"></div>
  </div>

  <!-- CENTRE: Action button -->
  <div id="action-col">
    <button id="btn-action" class="p1-style"
      data-key-p1=" " data-key-p2="Enter">ACTION</button>
  </div>

  <!-- Utility toggle and hidden utility buttons -->
  <button id="util-toggle" aria-label="Show utility buttons">MENU</button>
  <div id="util-col">
    <button class="util-btn esc-btn"  id="btn-esc">⏸ ESC</button>
    <button class="util-btn"          id="btn-prev">◄ PREV</button>
    <button class="util-btn"          id="btn-next">NEXT ►</button>
    <button class="util-btn mute-btn" id="btn-mute">🔊 MUSIC</button>
    <button class="util-btn sfx-btn"  id="btn-sfx">🔔 SFX</button>
    <button class="util-btn fs-btn"   id="btn-fullscreen">⛶ FULL</button>
  </div>

</div>

<script>
const WS_URL = (function(){
  var injected = '__WS_URL__';
  if(injected.indexOf('__') === -1) return injected;
  var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  return proto + '//' + location.host;
})();

let player = null, sock = null, connected = false;
const heldKeys = new Set();
const lastTap  = {};

function sendKey(down, key){
  if(!sock || sock.readyState !== 1) return;
  sock.send((down?'d':'u') + ':' + key);
}

// God mode: UP UP DOWN DOWN ACTION
const GOD_SEQ = ['up','up','down','down','action'];
let godIdx = 0, godTimer = null;
function checkGodSeq(step){
  if(step !== GOD_SEQ[godIdx]){ godIdx = step===GOD_SEQ[0]?1:0; return; }
  godIdx++;
  if(godTimer) clearTimeout(godTimer);
  godTimer = setTimeout(()=>{ godIdx=0; }, 4000);
  if(godIdx >= GOD_SEQ.length){
    godIdx=0;
    if(sock && sock.readyState===1) sock.send('GODMODE');
    document.body.style.background='#ffd700';
    setTimeout(()=>{ document.body.style.background=''; },600);
    vibrate([80,40,80,40,200]);
  }
}

// Heartbeat
setInterval(()=>{
  if(!connected) return;
  heldKeys.forEach(key => sendKey(true, key));
}, 100);

function vibrate(pattern){
  if(navigator.vibrate) navigator.vibrate(pattern);
}

// ── Player select ────────────────────────────────────────────────
function choosePlayer(p){
  requestFullscreen();
  player = p;
  document.getElementById('connecting-msg').style.display='block';
  document.getElementById('connecting-msg').textContent='Connecting...';

  sock = new WebSocket(WS_URL);
  sock.onopen = function(){
    sock.send(JSON.stringify({type:'player_register', player}));
  };
  sock.onmessage = function(e){
    var msg; try{ msg=JSON.parse(e.data); }catch(x){ return; }
    if(msg.type==='registered'){ connected=true; showController(); }
  };
  sock.onclose = function(){
    connected=false;
    if(document.getElementById('status-dot'))
      document.getElementById('status-dot').classList.remove('on');
    setTimeout(()=>{
      if(!player) return;
      sock=new WebSocket(WS_URL);
      sock.onopen=()=>sock.send(JSON.stringify({type:'player_register',player}));
      sock.onmessage=function(e){
        var msg; try{ msg=JSON.parse(e.data); }catch(x){ return; }
        if(msg.type==='registered'){ connected=true; document.getElementById('status-dot').classList.add('on'); }
      };
      sock.onclose = arguments.callee;
    },3000);
  };
}

function requestFullscreen(){
  const el = document.documentElement;
  try{
    if(!document.fullscreenElement && !document.webkitFullscreenElement){
      if(el.requestFullscreen) el.requestFullscreen({navigationUI:'hide'});
      else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    }
  }catch(e){}
  try{ if(screen.orientation&&screen.orientation.lock) screen.orientation.lock('landscape'); }catch(e){}
  setTimeout(()=>window.scrollTo(0,0), 60);
}

function toggleFullscreenMode(){
  const isFull = !!(document.fullscreenElement || document.webkitFullscreenElement);
  try{
    if(isFull){
      if(document.exitFullscreen) document.exitFullscreen();
      else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
    } else {
      requestFullscreen();
    }
  }catch(e){}
  setTimeout(updateFullscreenButton, 120);
}

function updateFullscreenButton(){
  const btn = document.getElementById('btn-fullscreen');
  if(!btn) return;
  const isFull = !!(document.fullscreenElement || document.webkitFullscreenElement);
  btn.textContent = isFull ? '⛶ EXIT' : '⛶ FULL';
}

function showController(){
  document.getElementById('screen-connect').classList.remove('active');
  const ctrl = document.getElementById('screen-ctrl');
  ctrl.classList.add('active');
  ctrl.classList.add(player==='p1'?'p1':'p2');
  document.getElementById('status-bar').style.display='flex';
  document.getElementById('status-bar').className=player==='p1'?'p1':'p2';
  document.getElementById('status-name').textContent=player==='p1'?'P1 — GORJAN':'P2 — MARTELA';
  document.getElementById('status-dot').classList.add('on');
  const utilToggle = document.getElementById('util-toggle');
  if(utilToggle) utilToggle.classList.add('visible');
  // Style action button
  const ab = document.getElementById('btn-action');
  ab.classList.add(player==='p1'?'p1-style':'p2-style');
  requestFullscreen();
  attachJoystick();
  attachActionBtn();
  attachUtilButtons();
}

// ── JOYSTICK ────────────────────────────────────────────────────
function attachJoystick(){
  const wrap  = document.getElementById('joystick-wrap');
  const knob  = document.getElementById('joystick-knob');
  const dirKeys = player==='p1'
    ? {up:'w', down:'s', left:'a', right:'d'}
    : {up:'ArrowUp', down:'ArrowDown', left:'ArrowLeft', right:'ArrowRight'};

  let activeDir = null;
  let touchId   = null;

  function getDir(touch){
    const rect  = wrap.getBoundingClientRect();
    const cx    = rect.left + rect.width  / 2;
    const cy    = rect.top  + rect.height / 2;
    const dx    = touch.clientX - cx;
    const dy    = touch.clientY - cy;
    const dist  = Math.sqrt(dx*dx + dy*dy);
    const dead  = rect.width * 0.12; // dead zone ~12% of radius
    if(dist < dead) return null;
    // Angle-based 4-way: 45° sectors
    const angle = Math.atan2(dy, dx) * 180 / Math.PI; // -180 to 180
    if(angle > -135 && angle <= -45)  return 'up';
    if(angle >  -45 && angle <=  45)  return 'right';
    if(angle >   45 && angle <= 135)  return 'down';
    return 'left';
  }

  function updateKnob(touch){
    const rect  = wrap.getBoundingClientRect();
    const cx    = rect.left + rect.width  / 2;
    const cy    = rect.top  + rect.height / 2;
    const dx    = touch.clientX - cx;
    const dy    = touch.clientY - cy;
    const dist  = Math.sqrt(dx*dx + dy*dy);
    const maxR  = rect.width * 0.3;
    const clamp = Math.min(dist, maxR) / dist || 0;
    const nx    = 50 + (dx * clamp / rect.width  * 2) * 100;
    const ny    = 50 + (dy * clamp / rect.height * 2) * 100;
    knob.style.left = nx + '%';
    knob.style.top  = ny + '%';
    knob.style.transform = 'translate(-50%,-50%)';
  }

  function resetKnob(){
    knob.style.left = '50%';
    knob.style.top  = '50%';
    knob.style.transform = 'translate(-50%,-50%)';
    knob.classList.remove('active');
  }

  function setDir(dir){
    if(dir === activeDir) return;
    // Release old
    if(activeDir){ heldKeys.delete(dirKeys[activeDir]); sendKey(false, dirKeys[activeDir]); }
    activeDir = dir;
    if(dir){
      heldKeys.add(dirKeys[dir]); sendKey(true, dirKeys[dir]);
      checkGodSeq(dir);
      knob.classList.add('active');
      vibrate(8);
    } else {
      resetKnob();
    }
  }

  wrap.addEventListener('touchstart', e=>{
    e.preventDefault();
    const t = e.changedTouches[0];
    touchId = t.identifier;
    updateKnob(t);
    setDir(getDir(t));
  },{passive:false});

  wrap.addEventListener('touchmove', e=>{
    e.preventDefault();
    for(let t of e.changedTouches){
      if(t.identifier === touchId){
        updateKnob(t);
        setDir(getDir(t));
      }
    }
  },{passive:false});

  function onEnd(e){
    e.preventDefault();
    for(let t of e.changedTouches){
      if(t.identifier === touchId){
        touchId = null;
        setDir(null);
        resetKnob();
      }
    }
  }
  wrap.addEventListener('touchend',    onEnd, {passive:false});
  wrap.addEventListener('touchcancel', onEnd, {passive:false});
}

// ── ACTION BUTTON ────────────────────────────────────────────────
function attachActionBtn(){
  const btn = document.getElementById('btn-action');
  const key = btn.getAttribute(player==='p1'?'data-key-p1':'data-key-p2');
  if(!key) return;
  btn.addEventListener('touchstart', e=>{
    e.preventDefault();
    checkGodSeq('action');
    if(!heldKeys.has(key)){ heldKeys.add(key); sendKey(true,key); btn.classList.add('pressed'); vibrate(25); }
  },{passive:false});
  btn.addEventListener('touchend',    e=>{ e.preventDefault(); heldKeys.delete(key); sendKey(false,key); btn.classList.remove('pressed'); },{passive:false});
  btn.addEventListener('touchcancel', e=>{ e.preventDefault(); heldKeys.delete(key); sendKey(false,key); btn.classList.remove('pressed'); },{passive:false});
}

// ── UTILITY BUTTONS ───────────────────────────────────────────────
function attachUtilButtons(){
  const utilToggle = document.getElementById('util-toggle');
  const utilPanel = document.getElementById('util-col');
  if(utilToggle && utilPanel && !utilToggle.dataset.bound){
    utilToggle.dataset.bound = '1';
    const toggle = e=>{
      e.preventDefault();
      utilToggle.classList.add('pressed');
      utilPanel.classList.toggle('visible');
      utilToggle.textContent = utilPanel.classList.contains('visible') ? '×' : 'MENU';
      vibrate(12);
      setTimeout(()=>utilToggle.classList.remove('pressed'),100);
    };
    utilToggle.addEventListener('touchstart', toggle, {passive:false});
    utilToggle.addEventListener('click', toggle);
  }

  function utilBtn(id, key){
    const btn = document.getElementById(id);
    if(!btn) return;
    btn.addEventListener('touchstart', e=>{ e.preventDefault(); btn.classList.add('pressed'); sendKey(true,key); vibrate(12); },{passive:false});
    btn.addEventListener('touchend',   e=>{ e.preventDefault(); btn.classList.remove('pressed'); sendKey(false,key); },{passive:false});
    btn.addEventListener('touchcancel',e=>{ e.preventDefault(); btn.classList.remove('pressed'); sendKey(false,key); },{passive:false});
  }
  utilBtn('btn-esc',  'Escape');
  utilBtn('btn-prev', '[');
  utilBtn('btn-next', ']');

  // Music mute
  const muteBtn = document.getElementById('btn-mute');
  let musicMuted = false;
  if(muteBtn){
    muteBtn.addEventListener('touchstart', e=>{
      e.preventDefault(); muteBtn.classList.add('pressed');
      musicMuted=!musicMuted;
      muteBtn.textContent = musicMuted ? '🔇 MUSIC' : '🔊 MUSIC';
      sendKey(true,'m'); vibrate(20);
    },{passive:false});
    muteBtn.addEventListener('touchend', e=>{ e.preventDefault(); muteBtn.classList.remove('pressed'); sendKey(false,'m'); },{passive:false});
  }

  // SFX mute
  const sfxBtn = document.getElementById('btn-sfx');
  let sfxMuted = false;
  if(sfxBtn){
    sfxBtn.addEventListener('touchstart', e=>{
      e.preventDefault(); sfxBtn.classList.add('pressed');
      sfxMuted=!sfxMuted;
      sfxBtn.textContent = sfxMuted ? '🔕 SFX' : '🔔 SFX';
      if(sock&&sock.readyState===1) sock.send('SFXMUTE'); vibrate(20);
    },{passive:false});
    sfxBtn.addEventListener('touchend', e=>{ e.preventDefault(); sfxBtn.classList.remove('pressed'); },{passive:false});
  }

  // Fullscreen toggle
  const fsBtn = document.getElementById('btn-fullscreen');
  if(fsBtn && !fsBtn.dataset.bound){
    fsBtn.dataset.bound = '1';
    const toggleFs = e=>{
      e.preventDefault();
      fsBtn.classList.add('pressed');
      toggleFullscreenMode();
      vibrate(20);
      setTimeout(()=>fsBtn.classList.remove('pressed'),120);
    };
    fsBtn.addEventListener('touchstart', toggleFs, {passive:false});
    fsBtn.addEventListener('click', toggleFs);
  }
  updateFullscreenButton();
}

document.addEventListener('fullscreenchange', updateFullscreenButton);
document.addEventListener('webkitfullscreenchange', updateFullscreenButton);

// ── Orientation / zoom prevention ────────────────────────────────
function checkOrientation(){
  const overlay = document.getElementById('rotate-overlay');
  if(!overlay) return;
  overlay.style.display = window.innerHeight > window.innerWidth ? 'flex' : 'none';
}
window.addEventListener('resize', ()=>{ checkOrientation(); setTimeout(()=>window.scrollTo(0,0),50); });
window.addEventListener('orientationchange', ()=>{ setTimeout(checkOrientation,200); });
checkOrientation();

document.addEventListener('gesturestart',  e=>e.preventDefault(), {passive:false});
document.addEventListener('gesturechange', e=>e.preventDefault(), {passive:false});
document.addEventListener('gestureend',    e=>e.preventDefault(), {passive:false});
let _dtapLast = 0;
document.addEventListener('touchend', e=>{
  const now = Date.now();
  if(now - _dtapLast < 300) e.preventDefault();
  _dtapLast = now;
},{passive:false});
document.addEventListener('touchmove', e=>e.preventDefault(),{passive:false});
document.addEventListener('contextmenu', e=>e.preventDefault());
</script>
