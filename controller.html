<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<meta name="mobile-web-app-capable" content="yes">
<style>
  /* Fill the entire screen including notch/safe areas */
  :root {
    --sat: env(safe-area-inset-top, 0px);
    --sab: env(safe-area-inset-bottom, 0px);
  }
  html { height: 100%; background: #000; }
  body {
    height: 100dvh; /* dynamic viewport height — excludes browser chrome */
    padding-top: max(var(--sat), 0px);
    padding-bottom: max(var(--sab), 0px);
  }
</style>
<title>🎮 Wedding Game Controller</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Press Start 2P',monospace,sans-serif;touch-action:none;}

  /* Loading Google Font */
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  /* ── SCREENS ─────────────────────────────── */
  .screen{display:none;width:100%;height:100%;position:absolute;top:0;left:0;}
  .screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center;}

  /* ── CONNECT SCREEN ──────────────────────── */
  #screen-connect{background:linear-gradient(135deg,#000010,#1a0030);}
  #screen-connect h1{color:#ffd700;font-size:10px;text-align:center;line-height:2;margin-bottom:24px;}
  #screen-connect p{color:#888;font-size:6px;text-align:center;margin-bottom:32px;line-height:2;}
  .player-btns{display:flex;gap:20px;}
  .player-btn{
    width:130px;height:130px;border-radius:16px;border:3px solid;
    font-family:inherit;font-size:8px;font-weight:bold;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:10px;cursor:pointer;transition:transform .1s,opacity .1s;
    line-height:1.6;
  }
  .player-btn:active{transform:scale(.94);}
  .player-btn.p1{background:#001a00;border-color:#00ff88;color:#00ff88;}
  .player-btn.p2{background:#1a0010;border-color:#ff1493;color:#ff1493;}
  .player-btn .emoji{font-size:32px;}
  .connecting-msg{color:#aaa;font-size:6px;margin-top:20px;display:none;}

  /* ── STATUS BAR ──────────────────────────── */
  #status-bar{
    position:fixed;top:0;left:0;right:0;height:44px;z-index:99;
    display:flex;align-items:center;justify-content:space-between;
    padding:0 16px;font-size:7px;
  }
  #status-bar.p1{background:#001a00;border-bottom:2px solid #00ff88;}
  #status-bar.p2{background:#1a0010;border-bottom:2px solid #ff1493;}
  #status-name{font-size:9px;}
  #status-dot{width:12px;height:12px;border-radius:50%;background:#555;}
  #status-dot.on{background:#00ff88;box-shadow:0 0 8px #00ff88;}

  /* ── UTILITY BUTTONS — horizontal row above action button ── */
  #utility-bar{
    display:none;
    flex-direction:row;
    flex-wrap:wrap;
    justify-content:center;
    gap:6px;
    max-width:180px;
  }
  #utility-bar.visible{ display:flex; }
  .util-btn{
    height:28px;padding:0 8px;border-radius:7px;
    border:1.5px solid rgba(255,255,255,0.18);
    background:rgba(255,255,255,0.05);
    font-family:inherit;font-size:6px;color:#888;
    display:flex;align-items:center;justify-content:center;gap:3px;
    touch-action:none;-webkit-user-select:none;user-select:none;
    -webkit-tap-highlight-color:transparent;white-space:nowrap;
  }
  .util-btn.pressed{background:rgba(255,255,255,0.22);color:#fff;}
  .util-btn.esc-btn{border-color:rgba(255,80,80,0.5);color:#ff8888;}
  .util-btn.esc-btn.pressed{background:rgba(255,0,0,0.18);}
  .util-btn.mute-btn{border-color:rgba(255,200,0,0.4);color:#ffcc44;}
  .util-btn.mute-btn.pressed{background:rgba(255,200,0,0.15);}
  .util-btn.sfx-btn{border-color:rgba(100,200,255,0.4);color:#88ccff;}
  .util-btn.sfx-btn.pressed{background:rgba(100,200,255,0.15);}

  /* Right side: util row on top, action button centered below */
  #right-col{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:20px;
    flex-shrink:0;
  }

  /* ── CONTROLLER SCREEN ── */
  #screen-ctrl{
    padding-top:44px;
    flex-direction:row;
    align-items:center;
    justify-content:space-around;
    padding-left:16px;
    padding-right:16px;
  }
  #screen-ctrl.p1{background:linear-gradient(135deg,#000d00,#001a00);}
  #screen-ctrl.p2{background:linear-gradient(135deg,#0d0010,#1a0018);}

  /* ── D-PAD ───────────────────────────────── */
  .dpad{
    position:relative;
    width:300px;height:300px;
    flex-shrink:0;
    touch-action:none;
  }
  /* Cross shape: hide corners via clip */
  .dpad-cross{
    position:absolute;inset:0;
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    grid-template-rows:1fr 1fr 1fr;
  }
  .dpad-cell{
    display:flex;align-items:center;justify-content:center;
    font-size:30px;color:rgba(255,255,255,0.5);
    background:rgba(255,255,255,0.07);
    border:1px solid rgba(255,255,255,0.1);
    transition:background .05s, color .05s;
  }
  .dpad-cell.corner{ background:transparent; border:none; pointer-events:none; }
  .dpad-cell.active{ background:rgba(255,255,255,0.28); color:#fff; }
  #dpad-up    { border-radius:14px 14px 0 0; }
  #dpad-down  { border-radius:0 0 14px 14px; }
  #dpad-left  { border-radius:14px 0 0 14px; }
  #dpad-right { border-radius:0 14px 14px 0; }
  #dpad-center{ background:rgba(0,0,0,0.2); }

  /* ── ACTION BUTTONS ─────────────────────── */
  .action-area{
    display:flex;flex-direction:column;align-items:center;gap:24px;
  }
  .action-btn{
    width:130px;height:130px;border-radius:50%;border:4px solid;
    font-family:inherit;font-size:11px;font-weight:bold;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:transform .05s;
    flex-shrink:0;
    touch-action:none;
  }
  .action-btn:active,.action-btn.pressed{transform:scale(.88);}
  .action-btn.jump{background:#001a00;border-color:#00ff88;color:#00ff88;}
  .action-btn.shoot{background:#1a1000;border-color:#ffd700;color:#ffd700;}
  .action-btn.p2{background:#1a0010;border-color:#ff1493;color:#ff1493;}

  .dpad-btn, .action-btn, .player-btn{
    -webkit-tap-highlight-color:transparent;
    -webkit-touch-callout:none;
    -webkit-user-select:none;
    user-select:none;
    touch-action:none;
    outline:none;
    -webkit-appearance:none;
  }

</style>
</head>
<body>

<!-- CONNECT SCREEN -->
<div id="screen-connect" class="screen active">
  <h1>GORJAN &amp; MARTELA<br>FOREVER ♥</h1>
  <p>Choose your player</p>
  <div class="player-btns">
    <button class="player-btn p1" onclick="choosePlayer('p1')">
      <span class="emoji">🧔</span>
      <span>GORJAN<br>Player 1</span>
    </button>
    <button class="player-btn p2" onclick="choosePlayer('p2')">
      <span class="emoji">💜</span>
      <span>MARTELA<br>Player 2</span>
    </button>
  </div>
  <p style="font-size:5px;color:#444;margin-top:20px;font-family:'Press Start 2P',monospace;">TAP A BUTTON TO GO FULLSCREEN</p>
  <p class="connecting-msg" id="connecting-msg">Connecting...</p>
</div>

<!-- STATUS BAR (shown on controller screen) -->
<div id="status-bar" style="display:none">
  <span id="status-name">P1 — GORJAN</span>
  <span id="status-dot"></span>
</div>

<!-- CONTROLLER SCREEN -->
<div id="screen-ctrl" class="screen">
  <!-- D-PAD: continuous cross -->
  <div class="dpad" id="dpad">
    <div class="dpad-cross">
      <div class="dpad-cell corner"></div>
      <div class="dpad-cell" id="dpad-up">▲</div>
      <div class="dpad-cell corner"></div>
      <div class="dpad-cell" id="dpad-left">◀</div>
      <div class="dpad-cell" id="dpad-center"></div>
      <div class="dpad-cell" id="dpad-right">▶</div>
      <div class="dpad-cell corner"></div>
      <div class="dpad-cell" id="dpad-down">▼</div>
      <div class="dpad-cell corner"></div>
    </div>
  </div>

  <!-- RIGHT COLUMN: utility buttons above action buttons -->
  <div id="right-col">
    <div id="utility-bar">
      <button class="util-btn esc-btn"  id="btn-esc">⏸ ESC</button>
      <button class="util-btn"          id="btn-prev">◄ PREV</button>
      <button class="util-btn"          id="btn-next">NEXT ►</button>
      <button class="util-btn mute-btn" id="btn-mute">🔊 MUSIC</button>
      <button class="util-btn sfx-btn"  id="btn-sfx">🔔 SFX</button>
    </div>

    <!-- Single ACTION button, centered -->
    <div class="action-area" id="action-area">
      <button class="action-btn shoot" id="btn-action"
        data-key-p1=" " data-key-p2="Enter">ACTION</button>
    </div>
  </div>
</div>



<script>
const WS_URL  = (function(){
  var injected = '__WS_URL__';
  if(injected.indexOf('__') === -1) return injected;
  var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  return proto + '//' + location.host;
})();

let player  = null;
let sock    = null;
let connected = false;
const heldKeys = new Set();   // keys currently being held
const lastTap  = {};

// ── Send compact key message ─────────────────────────────────────────
function sendKey(down, key){
  if(!sock || sock.readyState !== 1) return;
  sock.send((down?'d':'u') + ':' + key);
}

// Secret Konami code: UP UP DOWN DOWN LEFT RIGHT LEFT RIGHT ACTION
const KONAMI = ['up','up','down','down','left','right','left','right','action'];
let konamiIdx = 0, konamiTimer = null;
function checkKonami(step){
  if(step !== KONAMI[konamiIdx]){ konamiIdx = step===KONAMI[0]?1:0; return; }
  konamiIdx++;
  if(konamiTimer) clearTimeout(konamiTimer);
  konamiTimer = setTimeout(()=>{ konamiIdx=0; }, 3000);
  if(konamiIdx >= KONAMI.length){
    konamiIdx=0;
    if(sock && sock.readyState===1) sock.send('GODMODE');
    document.body.style.background='#ffd700';
    setTimeout(()=>{ document.body.style.background=''; },500);
    vibrate([80,40,80,40,200]);
  }
}

// Heartbeat — re-send held keys every 100ms to prevent stuck keys
setInterval(()=>{
  if(!connected) return;
  heldKeys.forEach(key => sendKey(true, key));
}, 100);

// ── Player select ────────────────────────────────────────────────────
function choosePlayer(p){
  player = p;
  document.getElementById('connecting-msg').style.display='block';
  document.getElementById('connecting-msg').textContent='Connecting...';

  sock = new WebSocket(WS_URL);

  sock.onopen = function(){
    // Register with compact format
    sock.send(JSON.stringify({type:'player_register', player}));
  };

  sock.onmessage = function(e){
    var msg; try{ msg=JSON.parse(e.data); }catch(x){ return; }
    if(msg.type==='registered'){ connected=true; showController(); }
  };

  sock.onclose = function(){
    connected=false;
    // Release all held keys on disconnect
    heldKeys.forEach(key => sendKey(false, key));
    heldKeys.clear();
    const dot=document.getElementById('status-dot');
    if(dot) dot.className='';
    setTimeout(()=>{ if(player) choosePlayer(player); }, 2000);
  };

  sock.onerror = function(){
    document.getElementById('connecting-msg').textContent='Cannot connect. Is the server running?';
  };

  // Keepalive ping every 10s
  setInterval(()=>{ if(sock&&sock.readyState===1) sock.send(JSON.stringify({type:'ping'})); }, 10000);
}

function showController(){
  // Try to go fullscreen as soon as controller is shown
  function requestFullscreen(){
    const el = document.documentElement;
    try{
      if(el.requestFullscreen) el.requestFullscreen({navigationUI:'hide'});
      else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if(el.mozRequestFullScreen) el.mozRequestFullScreen();
    }catch(e){}
    // Lock to portrait if supported
    try{
      if(screen.orientation && screen.orientation.lock) screen.orientation.lock('portrait');
    }catch(e){}
  }

  document.getElementById('screen-connect').classList.remove('active');
  document.getElementById('screen-ctrl').classList.add('active');
  document.getElementById('status-bar').style.display='flex';
  requestFullscreen();
  const isP1=player==='p1';
  document.getElementById('screen-ctrl').className='screen active '+(isP1?'p1':'p2');
  document.getElementById('status-bar').className=isP1?'p1':'p2';
  document.getElementById('status-name').textContent=isP1?'P1 — GORJAN':'P2 — MARTELA';
  document.getElementById('status-dot').className='on';
  if(!isP1) document.querySelectorAll('.action-btn').forEach(b=>b.classList.add('p2'));

  // Show utility bar
  const utilBar = document.getElementById('utility-bar');
  if(utilBar) utilBar.classList.add('visible');

  // Wire utility buttons
  function utilBtn(id, key){
    const btn = document.getElementById(id);
    if(!btn) return;
    btn.addEventListener('touchstart', e=>{
      e.preventDefault();
      btn.classList.add('pressed');
      sendKey(true, key);
      vibrate(20);
    },{passive:false});
    btn.addEventListener('touchend', e=>{
      e.preventDefault();
      btn.classList.remove('pressed');
      sendKey(false, key);
    },{passive:false});
    btn.addEventListener('touchcancel', e=>{
      e.preventDefault();
      btn.classList.remove('pressed');
      sendKey(false, key);
    },{passive:false});
  }
  utilBtn('btn-esc',  'Escape');
  utilBtn('btn-prev', '[');
  utilBtn('btn-next', ']');

  // SFX mute button
  const sfxBtn = document.getElementById('btn-sfx');
  let sfxMuted = false;
  if(sfxBtn){
    sfxBtn.addEventListener('touchstart', e=>{
      e.preventDefault();
      sfxBtn.classList.add('pressed');
      sfxMuted = !sfxMuted;
      sfxBtn.textContent = sfxMuted ? '🔕 SFX' : '🔔 SFX';
      // Send special sfxmute message
      if(sock && sock.readyState===1) sock.send('SFXMUTE');
      vibrate(20);
    },{passive:false});
    sfxBtn.addEventListener('touchend', e=>{ e.preventDefault(); sfxBtn.classList.remove('pressed'); },{passive:false});
  }

  // Mute button — toggles audio, updates label
  const muteBtn = document.getElementById('btn-mute');
  let muted = false;
  if(muteBtn){
    muteBtn.addEventListener('touchstart', e=>{
      e.preventDefault();
      muteBtn.classList.add('pressed');
      sendKey(true, 'm');
      muted = !muted;
      muteBtn.textContent = muted ? '🔇 UNMUTE' : '🔊 MUTE';
      vibrate(20);
    },{passive:false});
    muteBtn.addEventListener('touchend', e=>{
      e.preventDefault();
      muteBtn.classList.remove('pressed');
      sendKey(false, 'm');
    },{passive:false});
  }

  attachControls();
}

// ── Attach touch controls ────────────────────────────────────────────
function attachControls(){
  const dirKeys = player==='p1'
    ? {up:'w', down:'s', left:'a', right:'d'}
    : {up:'ArrowUp', down:'ArrowDown', left:'ArrowLeft', right:'ArrowRight'};

  // Continuous D-pad: coordinate-based detection
  const dpad = document.getElementById('dpad');
  let currentDpadKey = null;

  function getDpadDir(touch){
    const rect = dpad.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top  + rect.height/2;
    const dx = touch.clientX - cx;
    const dy = touch.clientY - cy;
    const dist = Math.sqrt(dx*dx+dy*dy);
    if(dist < 22) return null;
    return Math.abs(dy) > Math.abs(dx)
      ? (dy < 0 ? 'up' : 'down')
      : (dx < 0 ? 'left' : 'right');
  }

  function setDpadDir(dir){
    if(dir === currentDpadKey) return;
    if(currentDpadKey){
      const k = dirKeys[currentDpadKey];
      heldKeys.delete(k); sendKey(false, k);
      const el = document.getElementById('dpad-'+currentDpadKey);
      if(el) el.classList.remove('active');
    }
    currentDpadKey = dir;
    if(dir){
      const k = dirKeys[dir];
      heldKeys.add(k); sendKey(true, k);
      vibrate(18);
      const el = document.getElementById('dpad-'+dir);
      if(el) el.classList.add('active');
      checkKonami(dir);
    }
  }

  dpad.addEventListener('touchstart', e=>{ e.preventDefault(); setDpadDir(getDpadDir(e.changedTouches[0])); },{passive:false});
  dpad.addEventListener('touchmove',  e=>{ e.preventDefault(); setDpadDir(getDpadDir(e.changedTouches[0])); },{passive:false});
  dpad.addEventListener('touchend',   e=>{ e.preventDefault(); setDpadDir(null); },{passive:false});
  dpad.addEventListener('touchcancel',e=>{ e.preventDefault(); setDpadDir(null); },{passive:false});

  // Action buttons
  document.querySelectorAll('.action-btn').forEach(btn=>{
    const key = btn.getAttribute(player==='p1'?'data-key-p1':'data-key-p2');
    if(!key) return;
    btn.addEventListener('touchstart', e=>{ e.preventDefault(); if(!heldKeys.has(key)){ heldKeys.add(key); sendKey(true,key); btn.classList.add('pressed'); vibrate(25); checkKonami('action'); } },{passive:false});
    btn.addEventListener('touchend',   e=>{ e.preventDefault(); heldKeys.delete(key); sendKey(false,key); btn.classList.remove('pressed'); },{passive:false});
    btn.addEventListener('touchcancel',e=>{ e.preventDefault(); heldKeys.delete(key); sendKey(false,key); btn.classList.remove('pressed'); },{passive:false});
  });

}

function vibrate(ms){
  try{ navigator.vibrate && navigator.vibrate(ms); }catch(e){}
}

document.addEventListener('touchmove', e=>e.preventDefault(), {passive:false});
document.addEventListener('contextmenu', e=>e.preventDefault());
</script>
</body>
</html>
